server {
    listen 80;
    server_name _;

    # Frontend-Dateien direkt bedienen
    location / {
        root /usr/share/nginx/html;
        index index.html dashboard.html;
        try_files $uri $uri/ /index.html;
    }

    # WICHTIG: Einige Ordner verstecken, da wir den kompletten Hauptordner mounten
    location ^~ /backend/ { deny all; }
    location ^~ /bot/ { deny all; }
    location ^~ /nginx/ { deny all; }
    location = /docker-compose.yml { deny all; }
    location = /supabase_schema.sql { deny all; }

    # API-Requests an das Node.js Backend weiterleiten
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS Headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }
}
