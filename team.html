<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teams – Gemeindehaus Achim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; }
html, body { background: #f4f1e8 !important; color: #1c1b18 !important; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1b18; --paper: #f4f1e8; --cream: #ece8dc;
  --accent: #b85c2a; --accent-light: #f0d9cc;
  --muted: #79776e; --border: #d6d0c4; --radius: 5px;
  --success: #3a7a52; --danger: #991b1b;
}
body { font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; }

.shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }

/* SIDEBAR */
.sidebar { background: var(--ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo-text { font-size: 13px; font-weight: 500; color: white; }
.sidebar-logo-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 300; margin-top: 1px; }
.sidebar-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 10px 12px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--accent); color: white; font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.main { display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 18px 28px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 16px; }
.topbar h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
.topbar-sub { font-size: 12px; color: var(--muted); font-weight: 300; margin-top: 2px; }
.topbar-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.btn { padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-weight: 400; border: none; }
.btn-outline { background: white; border: 1px solid var(--border); color: var(--ink); }
.btn-outline:hover { border-color: var(--ink); }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { opacity: 0.88; }

.content { padding: 24px 28px; flex: 1; overflow-y: auto; }

/* STATS ROW */
.stats-row { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
.stat { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
.stat .n { font-family: 'DM Serif Display', serif; font-size: 28px; font-weight: 400; line-height: 1; }
.stat .l { font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 2px; }

/* 14-DAY GRID */
.grid-wrap { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; overflow-x: auto; }
.grid-table { border-collapse: collapse; min-width: 100%; }
.grid-table th { background: var(--paper); padding: 0; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
.grid-table th:last-child { border-right: none; }
.th-name { padding: 10px 14px; font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); text-align: left; min-width: 160px; }
.th-day { width: 52px; min-width: 52px; text-align: center; padding: 6px 4px; cursor: default; }
.th-day-num { font-size: 15px; font-weight: 400; color: var(--ink); line-height: 1; }
.th-day-name { font-size: 10px; color: var(--muted); margin-top: 2px; font-weight: 300; }
.th-day.today-col .th-day-num { color: var(--accent); font-weight: 500; }
.th-day.today-col .th-day-name { color: var(--accent); }
.th-day.weekend-col { background: var(--cream); }

/* COUNT ROW */
.count-row td { background: var(--cream); border-bottom: 2px solid var(--border); border-right: 1px solid var(--border); padding: 6px 4px; text-align: center; font-size: 12px; font-weight: 500; }
.count-row td:last-child { border-right: none; }
.count-row td.count-label { text-align: left; padding: 6px 14px; font-size: 11px; color: var(--muted); font-weight: 400; letter-spacing: 0.05em; text-transform: uppercase; }
.count-num { display: inline-block; min-width: 24px; height: 24px; border-radius: 12px; line-height: 24px; font-size: 13px; font-weight: 500; }
.count-high { background: #d4ead9; color: var(--success); }
.count-mid { background: var(--accent-light); color: var(--accent); }
.count-low { background: #fee2e2; color: var(--danger); }
.count-zero { color: var(--border); }

/* PERSON ROWS */
.grid-table td { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); padding: 0; }
.grid-table td:last-child { border-right: none; }
.grid-table tr:last-child td { border-bottom: none; }
.grid-table tr:hover .name-td { background: var(--paper); }

.name-td { padding: 10px 14px; min-width: 160px; }
.person-name { font-size: 13px; font-weight: 500; }
.person-meta { font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 1px; }
.tl-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 8px; background: #fef3c7; color: #92610a; border: 1px solid #fde68a; margin-left: 4px; vertical-align: middle; }

.day-td { width: 52px; min-width: 52px; text-align: center; padding: 8px 4px; }
.day-td.weekend-col { background: var(--cream); }
.day-indicator { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto; font-size: 11px; }
.di-present { background: #d4ead9; color: var(--success); }
.di-absent { background: #fee2e2; color: var(--danger); }
.di-nowork { background: transparent; color: var(--border); }
.di-schicht { background: var(--accent-light); color: var(--accent); }

/* TODAY PANEL */
.today-panel { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.today-panel h3 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; margin-bottom: 14px; }
.person-chips { display: flex; flex-wrap: wrap; gap: 8px; }
.person-chip { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: var(--radius); font-size: 13px; border: 1px solid var(--border); }
.person-chip.present { background: #f0faf4; border-color: #b0d9bc; }
.person-chip.absent { background: var(--paper); border-color: var(--border); opacity: 0.5; }
.person-chip .chip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip-dot-present { background: var(--success); }
.chip-dot-absent { background: var(--danger); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 400px; padding: 28px; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.mfield { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.mfield label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.mfield select { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; outline: none; width: 100%; background: var(--paper); cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2379776e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
.mfield select:focus { border-color: var(--accent); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.loading { padding: 48px; text-align: center; color: var(--muted); font-size: 13px; }

@media (max-width: 768px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .content { padding: 16px; }
  .topbar { padding: 14px 16px; }
}

/* MOBILE */
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 19; }
.sidebar-overlay.open { display: block; }
@media (max-width: 768px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: flex; position: fixed; left: -240px; top: 0; height: 100vh; width: 240px; z-index: 20; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .hamburger { display: flex; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; }
  .content { padding: 16px; }
  table { font-size: 12px; }
  th, td { padding: 8px 10px; }
}
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDSZ6yuKgdGFhymzHMLrdl_P3zGMCpj9kM",
  authDomain: "gemeindehaus-achim.firebaseapp.com",
  projectId: "gemeindehaus-achim",
  storageBucket: "gemeindehaus-achim.firebasestorage.app",
  messagingSenderId: "272798328583",
  appId: "1:272798328583:web:388aa8db19886e9be507a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const GEWERK_LABELS = {
  maurer:'Maurer',zimmerer:'Zimmerer',betonbauer:'Betonbauer',stahlbau:'Stahlbau',
  elektriker:'Elektriker',sanitaer:'Sanitär',trockenbau:'Trockenbau',
  maler:'Maler',fliesen:'Fliesen',schreiner:'Schreiner',bodenbelag:'Bodenbelag',
  dachdecker:'Dachdecker',geruestbau:'Gerüstbau',garten:'Garten',helfer:'Helfer'
};

const TEAM_COLORS = ['#7a3a12','#2d6a4f','#185fa5','#633806','#534AB7','#993C1D','#854F0B','#3B6D11','#0F6E56','#993556'];

const WOCHENTAG_KEYS = ['so','mo','di','mi','do','fr','sa'];
const WOCHENTAG_SHORT = ['So','Mo','Di','Mi','Do','Fr','Sa'];

let allPersons = [];
let leaders = {};   // gewerkId -> personId
let currentTeam = null;
let isAdmin = false;
let currentUser = null;

// ── AUTH ──
onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'dashboard.html'; return; }
  currentUser = user;

  // Load leaders config
  try {
    const snap = await getDoc(doc(db, 'planung', 'leaders'));
    if (snap.exists()) leaders = snap.data().leaders || {};
  } catch(e) {}

  // Load all persons
  const q = query(collection(db, 'anmeldungen'), orderBy('nachname'));
  onSnapshot(q, snap => {
    allPersons = [];
    snap.forEach(d => allPersons.push({id: d.id, ...d.data()}));

    // Check if user is admin or teamleiter
    const myPerson = allPersons.find(p => p.email === user.email);
    const myTeam = Object.entries(leaders).find(([g, pid]) => pid === (myPerson?.id));
    isAdmin = true; // all dashboard users are admin for now

    buildSidebar();
    if (currentTeam) showTeam(currentTeam);
    else showAllTeams();
  });
});

// ── HELPERS ──
function getTeams() {
  const teams = {};
  allPersons.forEach(p => {
    const now = new Date(); now.setHours(0,0,0,0);
    const arr = p.teams || (p.team ? [{team: p.team, von: null, bis: null}] : []);
    const active = arr.find(t => {
      const von = t.von ? new Date(t.von) : null;
      const bis = t.bis ? new Date(t.bis) : null;
      return (!von || von <= now) && (!bis || bis >= now);
    });
    if (active) {
      if (!teams[active.team]) teams[active.team] = [];
      teams[active.team].push(p);
    }
  });
  return teams;
}

function isPersonAvailable(person, date) {
  // Check day of week
  const dow = WOCHENTAG_KEYS[date.getDay()];
  const hasDay = (person.wochentage || []).includes(dow);
  if (!hasDay) return 'nowork';

  // Check absences
  const dateStr = date.toISOString().split('T')[0];
  const isAbsent = (person.abwesenheiten || []).some(a => {
    const von = a.von ? a.von.replace(/\./g, '-').split('-').reverse().join('-') : null;
    const bis = a.bis ? a.bis.replace(/\./g, '-').split('-').reverse().join('-') : null;
    if (!von) return false;
    return dateStr >= von && dateStr <= (bis || von);
  });
  if (isAbsent) return 'absent';

  return 'present';
}

function getNext14Days() {
  const days = [];
  const today = new Date(); today.setHours(0,0,0,0);
  for (let i = 0; i < 14; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() + i);
    days.push(d);
  }
  return days;
}

function fmtDate(d) {
  return d.toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'});
}

// ── SIDEBAR ──
function buildSidebar() {
  const teams = getTeams();
  const nav = document.getElementById('team-nav');
  nav.innerHTML = '';

  // "All teams" button (admin only)
  if (isAdmin) {
    const allBtn = document.createElement('button');
    allBtn.className = 'team-btn' + (!currentTeam ? ' active' : '');
    allBtn.innerHTML = '<span class="team-dot" style="background:var(--muted)"></span>Alle Teams';
    allBtn.onclick = () => { currentTeam = null; document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); showAllTeams(); };
    nav.appendChild(allBtn);
  }

  Object.keys(teams).sort().forEach((team, i) => {
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    const btn = document.createElement('button');
    btn.className = 'team-btn' + (currentTeam === team ? ' active' : '');
    const leaderId = leaders[team];
    const leader = leaderId ? allPersons.find(p => p.id === leaderId) : null;
    btn.innerHTML = '<span class="team-dot" style="background:' + color + '"></span>'
      + team + (leader ? ' <span style="font-size:10px;opacity:0.6">· ' + leader.vorname + '</span>' : '');
    btn.onclick = () => {
      currentTeam = team;
      document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      showTeam(team);
    };
    nav.appendChild(btn);
  });
}

// ── ALL TEAMS VIEW ──
function showAllTeams() {
  const teams = getTeams();
  const teamKeys = Object.keys(teams).sort();
  const today = new Date(); today.setHours(0,0,0,0);

  document.getElementById('topbar-title').textContent = 'Alle Teams';
  document.getElementById('topbar-sub').textContent = teamKeys.length + ' Teams · ' + allPersons.length + ' Personen';
  document.getElementById('topbar-actions').innerHTML = isAdmin
    ? '<button class="btn btn-accent" onclick="openLeaderModal(null)">Teamleiter zuweisen</button>' : '';

  const content = document.getElementById('content');

  // Stats
  let statsHtml = '<div class="stats-row">';
  statsHtml += '<div class="stat"><div class="n">' + teamKeys.length + '</div><div class="l">Teams</div></div>';
  statsHtml += '<div class="stat"><div class="n">' + allPersons.length + '</div><div class="l">Personen gesamt</div></div>';
  const todayPresent = allPersons.filter(p => isPersonAvailable(p, today) === 'present').length;
  statsHtml += '<div class="stat"><div class="n" style="color:var(--success)">' + todayPresent + '</div><div class="l">Heute verfügbar</div></div>';
  const unassigned = allPersons.filter(p => {
    const arr = p.teams || (p.team ? [{team:p.team}] : []);
    return arr.length === 0;
  }).length;
  if (unassigned > 0) statsHtml += '<div class="stat"><div class="n" style="color:var(--accent)">' + unassigned + '</div><div class="l">Ohne Team</div></div>';
  statsHtml += '</div>';

  // Team cards overview
  let cardsHtml = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px">';
  teamKeys.forEach((team, i) => {
    const members = teams[team];
    const color = TEAM_COLORS[i % TEAM_COLORS.length];
    const leaderId = leaders[team];
    const leader = leaderId ? allPersons.find(p => p.id === leaderId) : null;
    const presentToday = members.filter(p => isPersonAvailable(p, today) === 'present').length;

    cardsHtml += '<div style="background:white;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">'
      + '<div style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px">'
        + '<div style="width:12px;height:12px;border-radius:3px;background:' + color + ';flex-shrink:0"></div>'
        + '<div style="flex:1"><div style="font-size:14px;font-weight:500">' + team + '</div>'
          + (leader ? '<div style="font-size:11px;color:var(--muted)">Teamleiter: ' + leader.vorname + ' ' + leader.nachname + '</div>' : '<div style="font-size:11px;color:var(--muted)">Kein Teamleiter</div>')
        + '</div>'
        + '<div style="text-align:right"><div style="font-family:\'DM Serif Display\',serif;font-size:20px">' + presentToday + '/' + members.length + '</div><div style="font-size:10px;color:var(--muted)">heute da</div></div>'
      + '</div>'
      + '<div style="padding:12px 16px">'
        + members.slice(0,4).map(p => '<div style="font-size:13px;padding:3px 0;display:flex;align-items:center;gap:6px">'
            + '<span style="width:6px;height:6px;border-radius:50%;background:' + (isPersonAvailable(p,today)==='present'?'var(--success)':'var(--border)') + ';flex-shrink:0"></span>'
            + p.vorname + ' ' + p.nachname
          + '</div>').join('')
        + (members.length > 4 ? '<div style="font-size:12px;color:var(--muted);margin-top:4px">+' + (members.length-4) + ' weitere</div>' : '')
      + '</div>'
      + '<div style="padding:10px 16px;border-top:1px solid var(--border)">'
        + '<button onclick="showTeamByName(\'' + team.replace(/'/g,"\\'") + '\')" style="font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;font-family:\'DM Sans\',sans-serif;padding:0">14-Tage-Ansicht →</button>'
      + '</div>'
    + '</div>';
  });
  cardsHtml += '</div>';

  content.innerHTML = statsHtml + cardsHtml;
}

window.showTeamByName = function(name) {
  currentTeam = name;
  document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('active'));
  showTeam(name);
  buildSidebar();
};

// ── SINGLE TEAM VIEW ──
function showTeam(teamName) {
  const teams = getTeams();
  const members = teams[teamName] || [];
  const days = getNext14Days();
  const today = new Date(); today.setHours(0,0,0,0);
  const teamIndex = Object.keys(teams).sort().indexOf(teamName);
  const color = TEAM_COLORS[teamIndex % TEAM_COLORS.length];
  const leaderId = leaders[teamName];
  const leader = leaderId ? allPersons.find(p => p.id === leaderId) : null;

  document.getElementById('topbar-title').textContent = teamName;
  document.getElementById('topbar-sub').textContent = members.length + ' Personen'
    + (leader ? ' · Teamleiter: ' + leader.vorname + ' ' + leader.nachname : '');

  const actions = document.getElementById('topbar-actions');
  actions.innerHTML = '';
  if (isAdmin) {
    const btn = document.createElement('button');
    btn.className = 'btn btn-outline';
    btn.textContent = 'Teamleiter zuweisen';
    btn.onclick = () => openLeaderModal(teamName);
    actions.appendChild(btn);
  }
  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-outline';
  backBtn.textContent = '← Alle Teams';
  backBtn.onclick = () => { currentTeam = null; document.querySelectorAll('.team-btn').forEach(b=>b.classList.remove('active')); showAllTeams(); };
  actions.appendChild(backBtn);

  // TODAY SUMMARY
  const todayMembers = members.map(p => ({p, status: isPersonAvailable(p, today)}));
  const presentToday = todayMembers.filter(x => x.status === 'present').length;

  let todayHtml = '<div style="background:white;border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;margin-bottom:20px">'
    + '<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:14px">'
      + '<div style="font-family:\'DM Serif Display\',serif;font-size:18px">Heute – ' + today.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'}) + '</div>'
      + '<div style="font-family:\'DM Serif Display\',serif;font-size:28px;color:var(--success)">' + presentToday + '</div>'
      + '<div style="font-size:12px;color:var(--muted)">von ' + members.length + ' verfügbar</div>'
    + '</div>'
    + '<div style="display:flex;flex-wrap:wrap;gap:8px">'
    + todayMembers.map(({p, status}) => {
        const isPresent = status === 'present';
        return '<div style="display:flex;align-items:center;gap:7px;padding:7px 12px;border-radius:var(--radius);border:1px solid ' + (isPresent ? '#b0d9bc' : 'var(--border)') + ';background:' + (isPresent ? '#f0faf4' : 'var(--paper)') + ';opacity:' + (isPresent ? '1' : '0.5') + '">'
          + '<span style="width:7px;height:7px;border-radius:50%;background:' + (isPresent ? 'var(--success)' : 'var(--border)') + ';flex-shrink:0"></span>'
          + '<span style="font-size:13px;font-weight:' + (isPresent ? '500' : '300') + ';' + (isPresent ? '' : 'text-decoration:line-through') + '">' + p.vorname + ' ' + p.nachname + '</span>'
          + (p.id === leaderId ? '<span style="font-size:10px;background:#fef3c7;color:#92610a;border:1px solid #fde68a;border-radius:8px;padding:1px 5px">TL</span>' : '')
        + '</div>';
      }).join('')
    + '</div></div>';

  // 14-DAY TABLE
  let tableHtml = '<div class="grid-wrap"><table class="grid-table"><thead><tr>'
    + '<th class="th-name">Person</th>';

  days.forEach(d => {
    const isToday = d.getTime() === today.getTime();
    const isWE = d.getDay() === 0 || d.getDay() === 6;
    tableHtml += '<th class="th-day' + (isToday ? ' today-col' : '') + (isWE ? ' weekend-col' : '') + '">'
      + '<div class="th-day-num">' + d.getDate() + '</div>'
      + '<div class="th-day-name">' + WOCHENTAG_SHORT[d.getDay()] + '</div>'
    + '</th>';
  });
  tableHtml += '</tr></thead><tbody>';

  // Count row
  tableHtml += '<tr class="count-row"><td class="count-label">Verfügbar</td>';
  days.forEach(d => {
    const isWE = d.getDay() === 0 || d.getDay() === 6;
    const count = isWE ? 0 : members.filter(p => isPersonAvailable(p, d) === 'present').length;
    const total = members.length;
    const cls = count === 0 ? 'count-zero' : count >= total * 0.7 ? 'count-high' : count >= total * 0.4 ? 'count-mid' : 'count-low';
    tableHtml += '<td class="' + (isWE ? 'weekend-col' : '') + '">'
      + (isWE ? '<span style="color:var(--border)">–</span>' : '<span class="count-num ' + cls + '">' + count + '</span>')
    + '</td>';
  });
  tableHtml += '</tr>';

  // Person rows
  members.forEach(p => {
    const isLeader = p.id === leaderId;
    tableHtml += '<tr>'
      + '<td class="name-td"><div class="person-name">' + p.vorname + ' ' + p.nachname
        + (isLeader ? '<span class="tl-badge">TL</span>' : '') + '</div>'
        + '<div class="person-meta">' + (p.gewerke||[]).slice(0,2).map(g=>GEWERK_LABELS[g]||g).join(', ') + ' · ' + (p.schichtart||'–') + '</div>'
      + '</td>';

    days.forEach(d => {
      const isWE = d.getDay() === 0 || d.getDay() === 6;
      const status = isPersonAvailable(p, d);
      const isToday = d.getTime() === today.getTime();
      let dotClass = '', dotContent = '';
      if (isWE) { dotClass = ''; dotContent = ''; }
      else if (status === 'present') { dotClass = 'di-present'; dotContent = '✓'; }
      else if (status === 'absent') { dotClass = 'di-absent'; dotContent = '✕'; }
      else { dotClass = 'di-nowork'; dotContent = '–'; }

      tableHtml += '<td class="day-td' + (isWE ? ' weekend-col' : '') + '">'
        + (isWE ? '' : '<div class="day-indicator ' + dotClass + (isToday ? '" style="border:2px solid var(--accent)' : '') + '">' + dotContent + '</div>')
      + '</td>';
    });
    tableHtml += '</tr>';
  });

  tableHtml += '</tbody></table></div>';

  if (members.length === 0) {
    document.getElementById('content').innerHTML = '<div style="padding:48px;text-align:center;color:var(--muted)">Keine Personen in diesem Team.</div>';
    return;
  }

  document.getElementById('content').innerHTML = todayHtml + tableHtml;
}

// ── LEADER MODAL ──
window.openLeaderModal = function(teamName) {
  const teams = getTeams();
  const teamSel = document.getElementById('m-team');
  teamSel.innerHTML = Object.keys(teams).sort().map(t =>
    '<option value="' + t + '"' + (t === teamName ? ' selected' : '') + '>' + t + '</option>'
  ).join('');

  const leaderSel = document.getElementById('m-leader');
  const teamMembers = teamName ? (teams[teamName] || []) : allPersons;
  leaderSel.innerHTML = '<option value="">– Kein Teamleiter –</option>'
    + teamMembers.map(p =>
        '<option value="' + p.id + '"' + (leaders[teamName] === p.id ? ' selected' : '') + '>'
        + p.vorname + ' ' + p.nachname + '</option>'
      ).join('');

  teamSel.onchange = () => {
    const t = teamSel.value;
    const m = teams[t] || [];
    leaderSel.innerHTML = '<option value="">– Kein Teamleiter –</option>'
      + m.map(p => '<option value="' + p.id + '"' + (leaders[t] === p.id ? ' selected' : '') + '>' + p.vorname + ' ' + p.nachname + '</option>').join('');
  };

  document.getElementById('modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
};

window.saveLeader = async function() {
  const team = document.getElementById('m-team').value;
  const personId = document.getElementById('m-leader').value;
  if (!team) return;
  if (personId) leaders[team] = personId;
  else delete leaders[team];
  try {
    await setDoc(doc(db, 'planung', 'leaders'), { leaders });
    closeModal();
    buildSidebar();
    if (currentTeam) showTeam(currentTeam);
    else showAllTeams();
  } catch(e) { alert('Fehler: ' + e.message); }
};

</script>

<script>
function toggleSidebar() {
  var s = document.querySelector('.sidebar');
  var o = document.getElementById('sidebar-overlay');
  if (s) s.classList.toggle('open');
  if (o) o.classList.toggle('open');
}
function closeSidebar() {
  var s = document.querySelector('.sidebar');
  var o = document.getElementById('sidebar-overlay');
  if (s) s.classList.remove('open');
  if (o) o.classList.remove('open');
}
</script>
</body>
