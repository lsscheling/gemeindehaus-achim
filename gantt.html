<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewerk-Planung – Gemeindehaus Achim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; }
html, body { background: #f4f1e8 !important; color: #1c1b18 !important; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1b18; --paper: #f4f1e8; --cream: #ece8dc;
  --accent: #b85c2a; --accent-light: #f0d9cc;
  --muted: #79776e; --border: #d6d0c4; --radius: 5px;
  --success: #3a7a52;
  --col-w: 40px;
}
body { font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; }
.shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar { background: var(--ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo-text { font-size: 13px; font-weight: 500; color: white; }
.sidebar-logo-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 300; margin-top: 1px; }
.sidebar-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 10px 12px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; transition: all 0.15s; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--accent); color: white; font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
.main { display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 18px 28px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.topbar h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
.topbar p { font-size: 12px; color: var(--muted); font-weight: 300; margin-top: 2px; }
.topbar-right { display: flex; gap: 8px; }
.btn { padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-weight: 400; border: none; }
.btn-ink { background: var(--ink); color: white; }
.btn-ink:hover { background: #2e2d28; }
.btn-outline { background: white; border: 1px solid var(--border); color: var(--ink); }
.btn-outline:hover { border-color: var(--ink); }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { opacity: 0.88; }
.controls { padding: 14px 28px; background: var(--cream); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-shrink: 0; flex-wrap: wrap; }
.ctrl-field { display: flex; align-items: center; gap: 8px; }
.ctrl-field label { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); }
.ctrl-field input[type=date] { font-family: 'DM Sans', sans-serif; font-size: 12px; border: 1px solid var(--border); border-radius: var(--radius); padding: 6px 10px; background: white; outline: none; }
.zoom-btns { display: flex; gap: 4px; margin-left: auto; }
.zoom-btn { padding: 5px 10px; font-size: 11px; border: 1px solid var(--border); border-radius: var(--radius); background: white; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.zoom-btn.active, .zoom-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }
.progress-section { padding: 12px 28px; background: white; border-bottom: 1px solid var(--border); display: flex; gap: 12px; flex-wrap: wrap; align-items: center; flex-shrink: 0; }
.ps { background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; }
.ps-num { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; line-height: 1; }
.ps-lbl { font-size: 11px; color: var(--muted); font-weight: 300; }
.gantt-wrap { flex: 1; overflow: auto; }
.gantt-inner { display: flex; min-width: max-content; }
.gantt-labels { width: 200px; flex-shrink: 0; position: sticky; left: 0; z-index: 10; }
.gantt-label-head { height: 56px; background: white; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; align-items: flex-end; padding: 0 16px 8px; font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.07em; text-transform: uppercase; }
.gantt-label-row { height: 58px; background: white; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; cursor: pointer; transition: background 0.12s; gap: 8px; }
.gantt-label-row:hover { background: var(--paper); }
.gantt-label-color { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
.gantt-label-text { flex: 1; overflow: hidden; }
.gantt-label-name { font-size: 13px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gantt-label-gruppe { font-size: 10px; color: var(--muted); margin-top: 1px; }
.gantt-add-row { height: 44px; background: white; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; }
.gantt-add-btn { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); background: none; border: 1px dashed var(--border); border-radius: var(--radius); padding: 6px 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; width: 100%; }
.gantt-add-btn:hover { border-color: var(--accent); color: var(--accent); }
.gantt-timeline { flex: 1; position: relative; }
.gantt-head { height: 56px; position: sticky; top: 0; z-index: 8; background: white; border-bottom: 1px solid var(--border); overflow: hidden; }
.gantt-months { display: flex; height: 28px; border-bottom: 1px solid var(--border); }
.gantt-month { border-right: 1px solid var(--border); padding: 0 8px; font-size: 11px; font-weight: 500; color: var(--ink); display: flex; align-items: center; flex-shrink: 0; white-space: nowrap; overflow: hidden; }
.gantt-days { display: flex; height: 28px; }
.gantt-day { width: var(--col-w); text-align: center; font-size: 10px; color: var(--muted); border-right: 1px solid var(--border); padding: 6px 0; flex-shrink: 0; }
.gantt-day.weekend { background: var(--paper); }
.gantt-day.today { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.gantt-row { height: 58px; border-bottom: 1px solid var(--border); position: relative; display: flex; }
.gantt-cell { width: var(--col-w); flex-shrink: 0; border-right: 1px solid var(--border); height: 100%; }
.gantt-cell.weekend { background: var(--paper); }
.gantt-cell.today-col { background: rgba(184,92,42,0.04); }
.gantt-empty-row { height: 44px; border-bottom: 1px solid var(--border); display: flex; }
.gantt-bar { position: absolute; top: 11px; height: 36px; border-radius: 4px; display: flex; align-items: center; font-size: 12px; font-weight: 500; color: white; cursor: grab; user-select: none; z-index: 4; overflow: hidden; transition: box-shadow 0.15s; }
.gantt-bar:active { cursor: grabbing; }
.gantt-bar.dragging { opacity: 0.85; z-index: 20; box-shadow: 0 4px 16px rgba(0,0,0,0.25); }
.gantt-bar.done { opacity: 0.5; }
.bar-resize { width: 8px; height: 100%; background: rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 9px; }
.bar-resize-l { cursor: w-resize; }
.bar-resize-r { cursor: e-resize; }
.bar-label { flex: 1; padding: 0 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; pointer-events: none; }
.bar-progress { position: absolute; top: 0; left: 0; height: 100%; background: rgba(255,255,255,0.18); border-radius: 4px 0 0 4px; pointer-events: none; }
.today-line { position: absolute; top: 0; bottom: 0; width: 2px; background: var(--accent); z-index: 6; pointer-events: none; }
.gantt-tooltip { position: fixed; background: var(--ink); color: white; padding: 5px 10px; border-radius: var(--radius); font-size: 12px; pointer-events: none; z-index: 100; display: none; white-space: nowrap; font-family: 'DM Sans', sans-serif; }
.legend { padding: 10px 28px; border-top: 1px solid var(--border); background: white; display: flex; gap: 16px; flex-wrap: wrap; flex-shrink: 0; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 440px; max-height: 90vh; overflow-y: auto; padding: 28px; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; font-weight: 300; }
.mfield { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.mfield label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.mfield input, .mfield select { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; outline: none; width: 100%; background: var(--paper); }
.mfield select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2379776e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 12px center; padding-right: 32px; }
.mfield input:focus, .mfield select:focus { border-color: var(--accent); }
.mrow { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.color-dot { width: 24px; height: 24px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
.color-dot.selected { border-color: var(--ink); transform: scale(1.15); }
.done-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-top: 1px solid var(--border); margin-top: 4px; }
.done-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--success); cursor: pointer; }
.done-row label { font-size: 14px; cursor: pointer; }
.persons-section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }
.persons-title { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.person-chip { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; background: var(--paper); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 5px; }
.person-chip-name { font-size: 13px; font-weight: 500; }
.person-chip-meta { font-size: 11px; color: var(--muted); }
.level-badge { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 10px; border: 1px solid; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.delete-btn { color: #c0392b; background: none; border: 1px solid #f0a0a0; border-radius: var(--radius); padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 12px; cursor: pointer; margin-right: auto; }
.delete-btn:hover { background: #fdf0f0; }

/* MOBILE */
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 19; }
.sidebar-overlay.open { display: block; }
@media (max-width: 768px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: flex; position: fixed; left: -240px; top: 0; height: 100vh; width: 240px; z-index: 20; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .hamburger { display: flex; }
  .topbar { padding: 12px 16px; flex-wrap: wrap; }
  .content { padding: 16px; }
  table { font-size: 12px; }
  th, td { padding: 8px 10px; }
}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

<div class="shell">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Gemeindehaus Achim</div>
      <div class="sidebar-logo-sub">Gewerk-Planung</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Übersicht</div>

      <button class="nav-item " onclick="window.location.href='dashboard.html'">

      </button>
      <button class="nav-item " onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>

        QR-Code & Einladung
      </button>
      <button class="nav-item" onclick="window.open('anmeldung.html','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Anmeldeformular ↗

  </div>

  <div class="main">
    <div class="topbar" style="gap:12px">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      
      <div>
        <h1>Gewerk-Zeitplanung</h1>
        <p>Balken ziehen = verschieben · Ränder ziehen = Dauer · Balken klicken = bearbeiten</p>
      </div>
      <div class="topbar-right">
        <button class="btn btn-outline" id="save-btn" onclick="saveToFirebase()">Speichern</button>
        <button class="btn btn-accent" onclick="openAddModal()">+ Gewerk hinzufügen</button>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl-field">
        <label>Start</label>
        <input type="date" id="proj-start" onchange="rebuildGantt()">

      <div class="ctrl-field">
        <label>Ende</label>
        <input type="date" id="proj-end" onchange="rebuildGantt()">
      </div>
      <div class="zoom-btns">
        <button class="zoom-btn" onclick="setZoom(20,this)">Wochen</button>
        <button class="zoom-btn active" onclick="setZoom(40,this)">Standard</button>
        <button class="zoom-btn" onclick="setZoom(60,this)">Tage</button>
      </div>

          <div class="gantt-head" id="gantt-head"></div>
          <div id="gantt-rows" style="position:relative"></div>

      <div class="legend-item"><div class="legend-dot" style="background:#3a7a52"></div>Erledigt</div>

<div class="gantt-tooltip" id="tooltip"></div>

      <label>Gewerk *</label>
      <select id="m-gewerk">
        <option value="">– wählen –</option>
      </select>
    </div>
    <div class="mrow">
      <div class="mfield"><label>Start *</label><input type="date" id="m-start"></div>
      <div class="mfield"><label>Ende *</label><input type="date" id="m-end"></div>
    </div>
    <div class="mfield">
      <label>Farbe</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="mfield">
      <label>Anmerkung (optional)</label>
      <input type="text" id="m-note" placeholder="z.B. abhängig von Rohbau-Abschluss">
    </div>
    <div class="done-row" id="done-row" style="display:none">
      <input type="checkbox" id="m-done">
      <label for="m-done">Als <strong>erledigt</strong> markieren</label>

    <div class="persons-section" id="persons-section" style="display:none">
      <div class="persons-title">Personen mit diesem Gewerk</div>
      <div id="persons-list"></div>

      <button class="delete-btn" id="del-btn" onclick="deleteGewerk()" style="display:none">Löschen</button>
      <button class="btn btn-outline" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveGewerk()">Speichern</button>
    </div>
  </div>
</div>

<script>
// ── CONSTANTS ──
var GEWERK_LIST = [
  {id:'maurer',     label:'Maurer / -in',           gruppe:'Rohbau & Konstruktion'},
  {id:'zimmerer',   label:'Zimmerer / -in',          gruppe:'Rohbau & Konstruktion'},
  {id:'betonbauer', label:'Betonbauer / -in',        gruppe:'Rohbau & Konstruktion'},
  {id:'stahlbau',   label:'Stahlbau',                gruppe:'Rohbau & Konstruktion'},
  {id:'elektriker', label:'Elektriker / -in',        gruppe:'Technischer Ausbau'},
  {id:'sanitaer',   label:'Sanitär / HZG',           gruppe:'Technischer Ausbau'},
  {id:'trockenbau', label:'Trockenbau',              gruppe:'Technischer Ausbau'},
  {id:'maler',      label:'Maler / -in',             gruppe:'Innenausbau'},
  {id:'fliesen',    label:'Fliesen / Estrich',       gruppe:'Innenausbau'},
  {id:'schreiner',  label:'Schreiner / Tischler',    gruppe:'Innenausbau'},
  {id:'bodenbelag', label:'Bodenbelag',              gruppe:'Innenausbau'},
  {id:'dachdecker', label:'Dachdecker / -in',        gruppe:'Außenarbeiten'},
  {id:'geruestbau', label:'Gerüstbau',               gruppe:'Außenarbeiten'},
  {id:'garten',     label:'Garten / Außen',          gruppe:'Außenarbeiten'},
  {id:'helfer',     label:'Allgemeiner Helfer / -in',gruppe:'Unterstützung'}
];

var COLORS = ['#7a3a12','#2d6a4f','#185fa5','#633806','#534AB7','#993C1D','#854F0B','#3B6D11','#0F6E56','#993556','#5F5E5A','#A32D2D'];

var LEVEL_COLORS = {profi:'#2d6a4f', erfahren:'#b85c2a', grundkenntnisse:'#92610a', anfaenger:'#888'};
var LEVEL_LABELS = {profi:'Profi', erfahren:'Erfahren', grundkenntnisse:'Grundkenntnisse', anfaenger:'Anfänger'};

// ── STATE ──
var COL_W = 40;
var today = new Date(); today.setHours(0,0,0,0);
var projStart, projEnd, totalDays;
var editingId = null;
var selectedColor = COLORS[0];
var _gewerke = [];
var _persons = [];

// ── HELPERS ──
function offsetDate(base, days) {
  var d = new Date(base); d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function parseDate(str) {
  var p = str.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function daysBetween(a, b) { return Math.round((b - a) / 86400000); }
function toDateStr(d) { return d.toISOString().split('T')[0]; }
function fmtDate(str) {
  return parseDate(str).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric'});
}

// ── ZOOM ──
function setZoom(w, btn) {
  COL_W = w;
  document.documentElement.style.setProperty('--col-w', w + 'px');
  document.querySelectorAll('.zoom-btn').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  rebuildGantt();
}

// ── DEFAULT GEWERKE ──
function getDefaultGewerke() {
  var defaults = [
    {id:'maurer',start:0,end:45},{id:'zimmerer',start:20,end:65},
    {id:'elektriker',start:50,end:90},{id:'sanitaer',start:55,end:95},
    {id:'trockenbau',start:80,end:115},{id:'maler',start:100,end:130}
  ];
  return defaults.map(function(d, i) {
    var gw = GEWERK_LIST.find(function(g) { return g.id === d.id; });
    return {
      id: 'g_' + d.id, gewerkId: d.id,
      name: gw ? gw.label : d.id,
      color: COLORS[i % COLORS.length],
      start: offsetDate(today, d.start),
      end: offsetDate(today, d.end),
      note: '', done: false
    };
  });
}

// ── GANTT BUILD ──
function rebuildGantt() {
  var startEl = document.getElementById('proj-start');
  var endEl = document.getElementById('proj-end');
  if (!startEl.value) startEl.value = offsetDate(today, -7);
  if (!endEl.value) endEl.value = offsetDate(today, 130);
  projStart = parseDate(startEl.value);
  projEnd = parseDate(endEl.value);
  totalDays = daysBetween(projStart, projEnd) + 1;

  buildHeader();
  buildRows();
  positionTodayLine();
  updateProgress();
}

function buildHeader() {
  var head = document.getElementById('gantt-head');
  head.style.width = (totalDays * COL_W) + 'px';

  var months = [], curMonth = '', monthStart = 0;
  var daysHtml = '';

  for (var i = 0; i < totalDays; i++) {
    var d = new Date(projStart); d.setDate(d.getDate() + i);
    var isWE = d.getDay() === 0 || d.getDay() === 6;
    var isToday = d.getTime() === today.getTime();
    var mn = d.toLocaleDateString('de-DE', {month:'short', year:'2-digit'});
    if (mn !== curMonth) {
      if (curMonth) months.push({name: curMonth, days: i - monthStart});
      curMonth = mn; monthStart = i;
    }
    daysHtml += '<div class="gantt-day' + (isWE ? ' weekend' : '') + (isToday ? ' today' : '') + '">'
      + (COL_W >= 30 ? d.getDate() : '') + '</div>';
  }
  months.push({name: curMonth, days: totalDays - monthStart});

  var monthsHtml = months.map(function(m) {
    return '<div class="gantt-month" style="width:' + (m.days * COL_W) + 'px">' + m.name + '</div>';
  }).join('');

  head.innerHTML = '<div class="gantt-months">' + monthsHtml + '</div>'
    + '<div class="gantt-days">' + daysHtml + '</div>';
}

function buildRows() {
  var labelsEl = document.getElementById('gantt-labels');
  var rowsEl = document.getElementById('gantt-rows');
  labelsEl.innerHTML = '';
  rowsEl.innerHTML = '';
  rowsEl.style.width = (totalDays * COL_W) + 'px';

  var lhead = document.createElement('div');
  lhead.className = 'gantt-label-head';
  lhead.textContent = 'Gewerk';
  labelsEl.appendChild(lhead);

  _gewerke.forEach(function(g) {
    var gDef = GEWERK_LIST.find(function(x) { return x.id === g.gewerkId; });

    // Label
    var label = document.createElement('div');
    label.className = 'gantt-label-row';
    label.innerHTML = '<div class="gantt-label-color" style="background:' + (g.done ? '#aaa' : g.color) + '"></div>'
      + '<div class="gantt-label-text">'
        + '<div class="gantt-label-name" style="' + (g.done ? 'text-decoration:line-through;color:var(--muted)' : '') + '">' + g.name + '</div>'
        + '<div class="gantt-label-gruppe">' + (gDef ? gDef.gruppe : '') + '</div>'
      + '</div>'
      + (g.done ? '<span style="color:var(--success);font-size:13px">✓</span>' : '');
    label.onclick = (function(gid) { return function() { openEditModal(gid); }; })(g.id);
    labelsEl.appendChild(label);

    // Row
    var row = document.createElement('div');
    row.className = 'gantt-row';
    row.style.width = (totalDays * COL_W) + 'px';
    for (var i = 0; i < totalDays; i++) {
      var d = new Date(projStart); d.setDate(d.getDate() + i);
      var isWE = d.getDay() === 0 || d.getDay() === 6;
      var isToday = d.getTime() === today.getTime();
      var cell = document.createElement('div');
      cell.className = 'gantt-cell' + (isWE ? ' weekend' : '') + (isToday ? ' today-col' : '');
      row.appendChild(cell);
    }

    // Bar
    var gStart = parseDate(g.start), gEnd = parseDate(g.end);
    var startOff = daysBetween(projStart, gStart);
    var dur = daysBetween(gStart, gEnd) + 1;
    var cStart = Math.max(0, startOff);
    var cEnd = Math.min(totalDays, startOff + dur);

    if (cEnd > cStart) {
      var elapsed = Math.max(0, Math.min(dur, daysBetween(gStart, today) + 1));
      var pct = dur > 0 ? Math.round(elapsed / dur * 100) : 0;

      var bar = document.createElement('div');
      bar.className = 'gantt-bar' + (g.done ? ' done' : '');
      bar.style.left = (cStart * COL_W) + 'px';
      bar.style.width = ((cEnd - cStart) * COL_W) + 'px';
      bar.style.background = g.done ? '#aaa' : g.color;
      bar.innerHTML = '<div class="bar-resize bar-resize-l">⋮</div>'
        + (pct > 0 && !g.done ? '<div class="bar-progress" style="width:' + pct + '%"></div>' : '')
        + '<div class="bar-label">' + g.name + (g.note ? ' · ' + g.note : '') + '</div>'
        + '<div class="bar-resize bar-resize-r">⋮</div>';

      // Click label to edit
      bar.querySelector('.bar-label').addEventListener('click', (function(gid) {
        return function(e) { e.stopPropagation(); openEditModal(gid); };
      })(g.id));

      setupDrag(bar, g);
      row.appendChild(bar);
    }
    rowsEl.appendChild(row);
  });

  // Add row
  var addLabel = document.createElement('div');
  addLabel.className = 'gantt-add-row';
  addLabel.innerHTML = '<button class="gantt-add-btn" onclick="openAddModal()">+ Gewerk hinzufügen</button>';
  labelsEl.appendChild(addLabel);

  var emptyRow = document.createElement('div');
  emptyRow.className = 'gantt-empty-row';
  emptyRow.style.width = (totalDays * COL_W) + 'px';
  rowsEl.appendChild(emptyRow);
}

function positionTodayLine() {
  var line = document.getElementById('today-line');
  var off = daysBetween(projStart, today);
  if (off >= 0 && off < totalDays) {
    line.style.display = 'block';
    line.style.left = (off * COL_W + COL_W / 2) + 'px';
  } else {
    line.style.display = 'none';
  }
}

function updateProgress() {
  var total = _gewerke.length;
  var done = _gewerke.filter(function(g) { return g.done; }).length;
  var active = _gewerke.filter(function(g) {
    if (g.done) return false;
    var s = parseDate(g.start), e = parseDate(g.end);
    return s <= today && e >= today;
  }).length;
  var upcoming = _gewerke.filter(function(g) {
    return !g.done && parseDate(g.start) > today;
  }).length;
  var daysLeft = 0;
  if (_gewerke.length > 0) {
    var maxEnd = Math.max.apply(null, _gewerke.map(function(g) { return parseDate(g.end).getTime(); }));
    daysLeft = Math.max(0, daysBetween(today, new Date(maxEnd)));
  }

  document.getElementById('progress-section').innerHTML =
    '<div class="ps"><div class="ps-num" style="color:var(--success)">' + done + ' / ' + total + '</div><div class="ps-lbl">Erledigt</div></div>'
    + '<div class="ps"><div class="ps-num">' + active + '</div><div class="ps-lbl">Aktiv</div></div>'
    + '<div class="ps"><div class="ps-num">' + upcoming + '</div><div class="ps-lbl">Bevorstehend</div></div>'
    + '<div class="ps"><div class="ps-num">' + daysLeft + '</div><div class="ps-lbl">Tage verbleibend</div></div>';
}

// ── DRAG & DROP ──
function setupDrag(bar, g) {
  var tooltip = document.getElementById('tooltip');

  function showTip(x, y) {
    tooltip.style.display = 'block';
    tooltip.style.left = (x + 12) + 'px';
    tooltip.style.top = (y - 34) + 'px';
    tooltip.textContent = fmtDate(g.start) + ' – ' + fmtDate(g.end);
  }

  bar.addEventListener('mousedown', function(e) {
    if (e.target.classList.contains('bar-resize-l') || e.target.classList.contains('bar-resize-r')) return;
    e.preventDefault();
    var x0 = e.clientX, origS = g.start, origE = g.end;
    bar.classList.add('dragging');
    function move(e) {
      var delta = Math.round((e.clientX - x0) / COL_W);
      var ns = new Date(parseDate(origS)); ns.setDate(ns.getDate() + delta);
      var ne = new Date(parseDate(origE)); ne.setDate(ne.getDate() + delta);
      g.start = toDateStr(ns); g.end = toDateStr(ne);
      bar.style.left = (daysBetween(projStart, ns) * COL_W) + 'px';
      showTip(e.clientX, e.clientY);
    }
    function up() {
      bar.classList.remove('dragging'); tooltip.style.display = 'none';
      rebuildGantt();
      document.removeEventListener('mousemove', move);
      document.removeEventListener('mouseup', up);
    }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  });

  bar.querySelectorAll('.bar-resize-l, .bar-resize-r').forEach(function(handle) {
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      var side = handle.classList.contains('bar-resize-l') ? 'left' : 'right';
      var x0 = e.clientX, origS = g.start, origE = g.end;
      function move(e) {
        var delta = Math.round((e.clientX - x0) / COL_W);
        if (side === 'left') {
          var ns = new Date(parseDate(origS)); ns.setDate(ns.getDate() + delta);
          if (ns < parseDate(g.end)) { g.start = toDateStr(ns); bar.style.left = (daysBetween(projStart, ns) * COL_W) + 'px'; bar.style.width = ((daysBetween(ns, parseDate(g.end)) + 1) * COL_W) + 'px'; }
        } else {
          var ne = new Date(parseDate(origE)); ne.setDate(ne.getDate() + delta);
          if (ne > parseDate(g.start)) { g.end = toDateStr(ne); bar.style.width = ((daysBetween(parseDate(g.start), ne) + 1) * COL_W) + 'px'; }
        }
        showTip(e.clientX, e.clientY);
      }
      function up() { tooltip.style.display = 'none'; rebuildGantt(); document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', up);
    });
  });
}

// ── MODAL ──
function buildGewerkSelect(selectedId) {
  var sel = document.getElementById('m-gewerk');
  // Use master list from gewerke.html if available, fallback to GEWERK_LIST
  var list = (window._gewerkeList && window._gewerkeList.length > 0)
    ? window._gewerkeList.map(function(g) { return {id: g.id, label: g.name, gruppe: 'Gewerke'}; })
    : GEWERK_LIST;
  var groups = {};
  list.forEach(function(g) {
    var grp = g.gruppe || 'Gewerke';
    if (!groups[grp]) groups[grp] = [];
    groups[grp].push(g);
  });
  sel.innerHTML = '<option value="">– Gewerk wählen –</option>';
  Object.keys(groups).forEach(function(grp) {
    var og = document.createElement('optgroup');
    og.label = grp;
    groups[grp].forEach(function(g) {
      var opt = document.createElement('option');
      opt.value = g.id;
      opt.textContent = g.label;
      if (g.id === selectedId) opt.selected = true;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });
}

function buildColorGrid(sel) {
  var grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLORS.forEach(function(c) {
    var dot = document.createElement('div');
    dot.className = 'color-dot' + (c === sel ? ' selected' : '');
    dot.style.background = c;
    dot.onclick = function() {
      document.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('selected'); });
      dot.classList.add('selected');
      selectedColor = c;
    };
    grid.appendChild(dot);
  });
}

function loadPersons(gewerkId) {
  var sec = document.getElementById('persons-section');
  var list = document.getElementById('persons-list');
  sec.style.display = 'block';
  if (!gewerkId || _persons.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--muted);font-weight:300">Keine Personen geladen.</div>';
    return;
  }
  var matching = _persons.filter(function(p) { return (p.gewerke || []).includes(gewerkId); });
  if (matching.length === 0) {
    list.innerHTML = '<div style="font-size:13px;color:var(--muted);font-weight:300">Keine Personen mit diesem Gewerk angemeldet.</div>';
    return;
  }
  list.innerHTML = matching.map(function(p) {
    var lv = p.erfahrung && p.erfahrung[gewerkId] ? p.erfahrung[gewerkId] : '';
    var lvColor = LEVEL_COLORS[lv] || '#888';
    var lvLabel = LEVEL_LABELS[lv] || '–';
    return '<div class="person-chip">'
      + '<div><div class="person-chip-name">' + (p.vorname||'') + ' ' + (p.nachname||'') + '</div>'
      + '<div class="person-chip-meta">' + (p.schichtart || '–') + '</div></div>'
      + (lv ? '<span class="level-badge" style="color:'+lvColor+';border-color:'+lvColor+'">' + lvLabel + '</span>' : '')
      + '</div>';
  }).join('');
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Gewerk hinzufügen';
  document.getElementById('modal-sub').textContent = '';
  buildGewerkSelect(null);
  document.getElementById('m-start').value = toDateStr(today);
  document.getElementById('m-end').value = offsetDate(today, 30);
  document.getElementById('m-note').value = '';
  document.getElementById('done-row').style.display = 'none';
  document.getElementById('persons-section').style.display = 'none';
  document.getElementById('del-btn').style.display = 'none';
  selectedColor = COLORS[_gewerke.length % COLORS.length];
  buildColorGrid(selectedColor);
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  var g = _gewerke.find(function(x) { return x.id === id; });
  if (!g) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'Gewerk bearbeiten';
  document.getElementById('modal-sub').textContent = g.name;
  buildGewerkSelect(g.gewerkId || null);
  document.getElementById('m-start').value = g.start;
  document.getElementById('m-end').value = g.end;
  document.getElementById('m-note').value = g.note || '';
  document.getElementById('m-done').checked = g.done || false;
  document.getElementById('done-row').style.display = 'flex';
  document.getElementById('del-btn').style.display = 'block';
  selectedColor = g.color;
  buildColorGrid(selectedColor);
  loadPersons(g.gewerkId || null);
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
}

function saveGewerk() {
  var gewerkId = document.getElementById('m-gewerk').value;
  var start = document.getElementById('m-start').value;
  var end = document.getElementById('m-end').value;
  var note = document.getElementById('m-note').value;
  if (!gewerkId || !start || !end) { alert('Bitte Gewerk, Start und Ende auswählen.'); return; }
  if (start >= end) { alert('Enddatum muss nach Startdatum liegen.'); return; }
  var gDef = GEWERK_LIST.find(function(g) { return g.id === gewerkId; });
  var label = gDef ? gDef.label : gewerkId;
  var done = document.getElementById('m-done').checked;

  if (editingId) {
    var g = _gewerke.find(function(x) { return x.id === editingId; });
    if (g) { g.gewerkId = gewerkId; g.name = label; g.start = start; g.end = end; g.color = selectedColor; g.note = note; g.done = done; }
  } else {
    _gewerke.push({ id: 'g' + Date.now(), gewerkId: gewerkId, name: label, start: start, end: end, color: selectedColor, note: note, done: false });
  }
  closeModal();
  rebuildGantt();
}

function deleteGewerk() {
  if (!editingId || !confirm('Gewerk wirklich löschen?')) return;
  _gewerke = _gewerke.filter(function(g) { return g.id !== editingId; });
  closeModal();
  rebuildGantt();
}

// ── INIT ──
document.getElementById('proj-start').value = offsetDate(today, -7);
document.getElementById('proj-end').value = offsetDate(today, 130);
_gewerke = getDefaultGewerke();
rebuildGantt();
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

// ── FIREBASE CONFIG ──
const firebaseConfig = {
  apiKey: "...",
  authDomain: "gemeindehaus-achim.firebaseapp.com",
  projectId: "gemeindehaus-achim",
  storageBucket: "gemeindehaus-achim.appspot.com",
  messagingSenderId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── FIRESTORE LADE-FUNKTION ──
async function loadGewerke() {
  try {
    const gewerkeCol = collection(db, "gewerke");
    const gewerkeSnap = await getDocs(gewerkeCol);

    _gewerke = gewerkeSnap.docs.map(doc => {
      const data = doc.data();
      // Datum auf ISO-String prüfen
      const start = typeof data.start === "string" ? data.start : data.start.toDate().toISOString().split('T')[0];
      const end = typeof data.end === "string" ? data.end : data.end.toDate().toISOString().split('T')[0];
      return {
        id: doc.id,
        gewerkId: data.gewerkId,
        name: data.name,
        start: start,
        end: end,
        color: data.color || COLORS[0],
        note: data.note || "",
        done: data.done || false
      };
    });

    rebuildGantt();
  } catch (err) {
    console.error("Fehler beim Laden der Gewerke:", err);
    document.getElementById('progress-section').textContent = "Fehler beim Laden der Gewerke.";
  }
}

// ── beim Laden der Seite aufrufen ──
loadGewerke();
</script>

<script>
function toggleSidebar() {
  var s = document.querySelector('.sidebar');
  var o = document.getElementById('sidebar-overlay');
  if (s) s.classList.toggle('open');
  if (o) o.classList.toggle('open');
}
function closeSidebar() {
  var s = document.querySelector('.sidebar');
  var o = document.getElementById('sidebar-overlay');
  if (s) s.classList.remove('open');
  if (o) o.classList.remove('open');
}
</script>
