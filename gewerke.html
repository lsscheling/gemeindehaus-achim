<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDSZ6yuKgdGFhymzHMLrdl_P3zGMCpj9kM",
  authDomain: "gemeindehaus-achim.firebaseapp.com",
  projectId: "gemeindehaus-achim",
  storageBucket: "gemeindehaus-achim.firebasestorage.app",
  messagingSenderId: "272798328583",
  appId: "1:272798328583:web:388aa8db19886e9be507a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const COLORS = ['#7a3a12','#2d6a4f','#185fa5','#633806','#534AB7','#993C1D','#854F0B','#3B6D11','#0F6E56','#993556','#5F5E5A','#A32D2D'];
const BASIS = [
  'Maurer / -in','Zimmerer / -in','Betonbauer / -in','Stahlbau',
  'Elektriker / -in','Sanitär / HZG','Trockenbau',
  'Maler / -in','Fliesen / Estrich','Schreiner / Tischler','Bodenbelag',
  'Dachdecker / -in','Gerüstbau','Garten / Außen','Allgemeiner Helfer / -in'
];

function defaultLevels() {
  return [
    {id:'profi',        name:'Beruflich ausgebildet', color:'#2d6a4f'},
    {id:'erfahren',     name:'Hobbymäßig erfahren',   color:'#b85c2a'},
    {id:'grundkenntnisse', name:'Grundkenntnisse',    color:'#92610a'},
    {id:'anfaenger',    name:'Anfänger',               color:'#888888'}
  ];
}

let gewerke = [];
let levels  = [];
let editingId = null;
let selColor  = COLORS[0];

// ── INIT ──
onAuthStateChanged(auth, async user => {
  if (!user) { location.href = 'dashboard.html'; return; }
  await load();
  render();
});

// ── LOAD FIRESTORE ──
async function load() {
  try {
    const snap = await getDoc(doc(db, 'planung', 'gewerkeKonfig'));
    if (snap.exists() && snap.data().gewerke?.length) {
      gewerke = snap.data().gewerke;
      levels  = snap.data().levels || defaultLevels();
    } else {
      const defLevels = defaultLevels();
      const allLvIds  = defLevels.map(l => l.id);
      gewerke = BASIS.map((name, i) => ({
        id: 'gw_' + i, name, active: true,
        minPersons: 1,
        color: COLORS[i % COLORS.length],
        levels: name === 'Allgemeiner Helfer / -in' ? [] : allLvIds
      }));
      levels = defLevels;
    }
  } catch(e) {
    const defLevels = defaultLevels();
    gewerke = BASIS.map((name, i) => ({
      id: 'gw_' + i, name, active: true,
      minPersons: 1, color: COLORS[i % COLORS.length],
      levels: defLevels.map(l => l.id)
    }));
    levels = defLevels;
  }
}

// ── SAVE TO FIRESTORE ──
async function saveToDb() {
  levels.forEach(lv => {
    const el = document.getElementById('lv-inp-' + lv.id);
    if (el) lv.name = el.value.trim() || lv.name;
  });
  await setDoc(doc(db, 'planung', 'gewerkeKonfig'), {
    gewerke, levels, savedAt: new Date().toISOString()
  });

  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.saveAll = async function() {
  await saveToDb();
};

// ── RENDER ──
function render() {
  const activeCount = gewerke.filter(g => g.active).length;
  document.getElementById('content').innerHTML = `
    <div class="section">
      <div class="section-header">
        <span class="section-title">Gewerke (${gewerke.length})</span>
        <span style="font-size:12px;color:var(--muted)">${activeCount} aktiv in Anmeldung</span>
      </div>
      ${gewerke.map(g => {
        const gLevels = (g.levels || []).map(lid => levels.find(l => l.id === lid)).filter(Boolean);
        return `<div class="gewerk-row">
          <label class="toggle">
            <input type="checkbox" ${g.active ? 'checked' : ''} onchange="toggleGewerk('${g.id}',this.checked)">
            <div class="toggle-track"></div><div class="toggle-thumb"></div>
          </label>
          <div class="gewerk-color-dot" style="background:${g.color}"></div>
          <div style="flex:1;min-width:0">
            <div class="gewerk-name" style="${g.active ? '' : 'color:var(--muted)'}">${g.name}</div>
            <div class="gewerk-sub">Min. ${g.minPersons} Person${g.minPersons!==1?'en':''}</div>
            <div class="level-pills">
              ${gLevels.length > 0
                ? gLevels.map(lv => `<span class="level-pill" style="color:${lv.color};border-color:${lv.color}40;background:${lv.color}15">${lv.name}</span>`).join('')
                : '<span style="font-size:11px;color:var(--border);font-style:italic">Kein Erfahrungslevel</span>'}
            </div>
          </div>
          <div style="display:flex;gap:5px;flex-shrink:0">
            <button class="btn btn-icon btn-sm" onclick="editGewerk('${g.id}')">✎</button>
            <button class="btn btn-icon del btn-sm" onclick="removeGewerk('${g.id}')">✕</button>
          </div>
        </div>`;
      }).join('')}
      <div class="add-row">
        <div class="add-field">
          <label>Neues Gewerk</label>
          <input type="text" id="new-gw" placeholder="Bezeichnung …" style="width:220px">
        </div>
        <button class="btn btn-outline btn-sm" onclick="addGewerk()" style="align-self:flex-end">+ Hinzufügen</button>
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-title">Erfahrungslevel (${levels.length})</span>
        <span style="font-size:12px;color:var(--muted)">Namen direkt editierbar</span>
      </div>
      ${levels.map(lv => `
        <div class="level-row">
          <div class="level-color-dot" style="background:${lv.color}"></div>
          <input class="level-name-input" id="lv-inp-${lv.id}" value="${lv.name}" placeholder="Level-Name">
          <button class="btn btn-icon del btn-sm" onclick="deleteLevel('${lv.id}')">✕</button>
        </div>
      `).join('')}
      <div class="add-row">
        <div class="add-field">
          <label>Neues Level</label>
          <input type="text" id="new-lv" placeholder="Bezeichnung …" style="width:200px">
        </div>
        <button class="btn btn-outline btn-sm" onclick="addLevel()" style="align-self:flex-end">+ Hinzufügen</button>
      </div>
    </div>

    <p style="font-size:12px;color:var(--muted);text-align:center">
      Änderungen oben rechts speichern – erst dann werden sie in der Anmeldung übernommen.
    </p>
  `;
}

// ── GEWERK ACTIONS ──
window.toggleGewerk = function(id, val) {
  const g = gewerke.find(x => x.id === id);
  if (g) g.active = val;
  render();
};

window.addGewerk = function() {
  const name = document.getElementById('new-gw').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  gewerke.push({
    id: 'gw_' + Date.now(), name, active: true,
    minPersons: 1, color: COLORS[gewerke.length % COLORS.length],
    levels: levels.map(l => l.id)
  });
  render();
};

window.removeGewerk = function(id) {
  const g = gewerke.find(x => x.id === id);
  if (!confirm('"' + g?.name + '" wirklich löschen?')) return;
  gewerke = gewerke.filter(x => x.id !== id);
  render();
};

window.editGewerk = function(id) {
  const g = gewerke.find(x => x.id === id);
  if (!g) return;
  editingId = id; selColor = g.color;
  document.getElementById('modal-title').textContent = g.name + ' bearbeiten';
  document.getElementById('m-name').value = g.name;
  document.getElementById('m-min').value = g.minPersons || 1;
  document.getElementById('m-del').style.display = 'block';
  document.getElementById('m-colors').innerHTML = COLORS.map(c =>
    `<div class="cpick${c===selColor?' sel':''}" style="background:${c}" onclick="pickColor('${c}',this)"></div>`
  ).join('');
  document.getElementById('m-levels').innerHTML = levels.map(lv =>
    `<label class="lv-check">
      <input type="checkbox" value="${lv.id}" ${(g.levels||[]).includes(lv.id)?'checked':''}>
      <div class="lv-check-dot" style="background:${lv.color}"></div>
      <span>${lv.name}</span>
    </label>`
  ).join('');
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 100);
};

window.pickColor = function(c, el) {
  selColor = c;
  document.querySelectorAll('.cpick').forEach(d => d.classList.remove('sel'));
  el.classList.add('sel');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
};

window.saveGewerk = function() {
  const name = document.getElementById('m-name').value.trim();
  const min  = parseInt(document.getElementById('m-min').value) || 1;
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  const selLevels = [...document.querySelectorAll('#m-levels input:checked')].map(cb => cb.value);
  const g = gewerke.find(x => x.id === editingId);
  if (g) { g.name = name; g.minPersons = min; g.color = selColor; g.levels = selLevels; }
  closeModal(); render();
};

window.deleteGewerk = function() {
  const g = gewerke.find(x => x.id === editingId);
  if (!confirm('"' + g?.name + '" wirklich löschen?')) return;
  gewerke = gewerke.filter(x => x.id !== editingId);
  closeModal(); render();
};

// ── LEVEL ACTIONS ──
window.addLevel = function() {
  const name = document.getElementById('new-lv').value.trim();
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }
  levels.push({id: 'lv_' + Date.now(), name, color: COLORS[levels.length % COLORS.length]});
  render();
};

window.deleteLevel = function(id) {
  const lv = levels.find(l => l.id === id);
  if (!confirm('"' + lv?.name + '" löschen? Wird aus allen Gewerken entfernt.')) return;
  levels = levels.filter(l => l.id !== id);
  gewerke.forEach(g => { g.levels = (g.levels||[]).filter(l => l !== id); });
  render();
};
</script>
