<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gewerke – Gemeindehaus Achim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; }
html, body { background: #f4f1e8 !important; color: #1c1b18 !important; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1b18; --paper: #f4f1e8; --cream: #ece8dc;
  --accent: #b85c2a; --accent-light: #f0d9cc;
  --muted: #79776e; --border: #d6d0c4; --radius: 5px;
  --success: #3a7a52; --danger: #991b1b;
}
body { font-family: 'DM Sans', sans-serif; min-height: 100vh; font-size: 14px; }
.shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
.sidebar { background: var(--ink); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.sidebar-logo { padding: 24px 20px 20px; border-bottom: 1px solid rgba(255,255,255,0.08); }
.sidebar-logo-text { font-size: 13px; font-weight: 500; color: white; }
.sidebar-logo-sub { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 300; margin-top: 1px; }
.sidebar-nav { padding: 16px 12px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 10px 12px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: var(--radius); color: rgba(255,255,255,0.55); font-size: 13px; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; width: 100%; text-align: left; transition: all 0.15s; -webkit-tap-highlight-color: transparent; }
.nav-item:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
.nav-item.active { background: var(--accent); color: white; font-weight: 500; }
.nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }

.main { display: flex; flex-direction: column; }
.topbar { padding: 18px 28px; border-bottom: 1px solid var(--border); background: white; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-shrink: 0; }
.topbar h1 { font-family: 'DM Serif Display', serif; font-size: 22px; font-weight: 400; }
.topbar p { font-size: 12px; color: var(--muted); font-weight: 300; margin-top: 2px; }
.btn { padding: 8px 16px; font-family: 'DM Sans', sans-serif; font-size: 12px; border-radius: var(--radius); cursor: pointer; transition: all 0.15s; font-weight: 400; border: none; }
.btn-accent { background: var(--accent); color: white; }
.btn-accent:hover { opacity: 0.88; }
.btn-outline { background: white; border: 1px solid var(--border); color: var(--ink); }
.btn-outline:hover { border-color: var(--ink); }
.btn-danger { background: none; border: 1px solid #f0a0a0; color: var(--danger); }
.btn-danger:hover { background: #fdf0f0; }

.content { padding: 28px; flex: 1; overflow-y: auto; }

/* GEWERK LIST */
.gewerk-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
.gewerk-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; gap: 14px; padding: 14px 18px; transition: border-color 0.15s; }
.gewerk-card:hover { border-color: var(--muted); }
.gewerk-color { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.gewerk-info { flex: 1; }
.gewerk-name { font-size: 14px; font-weight: 500; }
.gewerk-meta { font-size: 12px; color: var(--muted); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
.gewerk-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 10px; font-size: 11px; font-weight: 400; }
.badge-geplant { background: #d4ead9; color: var(--success); border: 1px solid #b0d9bc; }
.badge-ungeplant { background: #fee2e2; color: var(--danger); border: 1px solid #fca5a5; }
.badge-personen { background: var(--accent-light); color: var(--accent); border: 1px solid #ddb99a; }
.badge-standard { background: var(--cream); color: var(--muted); border: 1px solid var(--border); }
.badge-custom { background: #e8f4ed; color: var(--success); border: 1px solid #b0d9bc; }

.gewerk-actions { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn { background: none; border: 1px solid var(--border); border-radius: var(--radius); width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); transition: all 0.15s; font-size: 14px; }
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }
.icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

.gantt-hint { background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.gantt-hint a { color: var(--accent); text-decoration: none; font-weight: 500; }
.gantt-hint a:hover { text-decoration: underline; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 50; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: white; border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 420px; padding: 28px; }
.modal h3 { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; margin-bottom: 20px; }
.mfield { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.mfield label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.mfield input, .mfield select { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; outline: none; width: 100%; background: var(--paper); }
.mfield input:focus, .mfield select:focus { border-color: var(--accent); }
.mfield input[type=number] { width: 100px; }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
.color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.15s; }
.color-dot.selected { border-color: var(--ink); transform: scale(1.15); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.modal-delete { margin-right: auto; }

/* MOBILE */
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 8px; flex-direction: column; gap: 5px; }
.hamburger span { display: block; width: 22px; height: 2px; background: var(--ink); border-radius: 2px; }
.sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 19; }
.sidebar-overlay.open { display: block; }
@media (max-width: 768px) {
  .shell { grid-template-columns: 1fr; }
  .sidebar { display: flex; position: fixed; left: -240px; top: 0; height: 100vh; width: 240px; z-index: 20; transition: left 0.25s ease; }
  .sidebar.open { left: 0; }
  .hamburger { display: flex; }
  .topbar { padding: 12px 16px; }
  .content { padding: 16px; }
}
</style>
</head>
<body>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>
<div class="shell">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-text">Gemeindehaus Achim</div>
      <div class="sidebar-logo-sub">Gewerk-Verwaltung</div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Übersicht</div>
      <button class="nav-item " onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Anmeldungen
      </button>
      <button class="nav-item " onclick="window.location.href='team.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Teams
      </button>
      <button class="nav-item " onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Schichtplan
      </button>
      <button class="nav-item " onclick="window.location.href='dashboard.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Abwesenheiten
      </button>
      <div class="nav-label" style="margin-top:8px">Planung</div>
      <button class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Gewerke
      </button>
      <button class="nav-item " onclick="window.location.href='gantt.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Gewerk-Planung
      </button>
      <div class="nav-label" style="margin-top:8px">Einladung</div>
      <button class="nav-item " onclick="window.location.href='einladung.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>
        QR-Code & Einladung
      </button>
      <button class="nav-item" onclick="window.open('anmeldung.html','_blank')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Anmeldeformular ↗
      </button>
    </nav>
  </div>

  <div class="main">
    <div class="topbar" style="gap:12px">
      <button class="hamburger" onclick="toggleSidebar()"><span></span><span></span><span></span></button>
      <div style="flex:1">
        <h1>Gewerke verwalten</h1>
        <p>Definiere alle Gewerke für dieses Projekt. Plane sie danach zeitlich im Gantt-Diagramm.</p>
      </div>
      <button class="btn btn-accent" onclick="openModal()">+ Neues Gewerk</button>
    </div>

    <div class="content" id="content">
      <div style="padding:48px;text-align:center;color:var(--muted)">Wird geladen…</div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">Neues Gewerk</h3>
    <div class="mfield">
      <label>Bezeichnung *</label>
      <input type="text" id="m-name" placeholder="z.B. Maurer, Elektriker …">
    </div>
    <div class="mfield">
      <label>Mindestpersonen</label>
      <input type="number" id="m-min" min="1" value="1">
    </div>
    <div class="mfield">
      <label>Farbe</label>
      <div class="color-grid" id="color-grid"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger modal-delete" id="m-del" onclick="deleteGewerk()" style="display:none">Löschen</button>
      <button class="btn btn-outline" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-accent" onclick="saveGewerk()">Speichern</button>
    </div>
  </div>
</div>

<script>
function toggleSidebar() {
  var s = document.querySelector('.sidebar'), o = document.getElementById('sidebar-overlay');
  if (s) s.classList.toggle('open');
  if (o) o.classList.toggle('open');
}
function closeSidebar() {
  var s = document.querySelector('.sidebar'), o = document.getElementById('sidebar-overlay');
  if (s) s.classList.remove('open');
  if (o) o.classList.remove('open');
}
</script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, getDocs, collection, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDSZ6yuKgdGFhymzHMLrdl_P3zGMCpj9kM",
  authDomain: "gemeindehaus-achim.firebaseapp.com",
  projectId: "gemeindehaus-achim",
  storageBucket: "gemeindehaus-achim.firebasestorage.app",
  messagingSenderId: "272798328583",
  appId: "1:272798328583:web:388aa8db19886e9be507a2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const COLORS = ['#7a3a12','#2d6a4f','#185fa5','#633806','#534AB7','#993C1D','#854F0B','#3B6D11','#0F6E56','#993556','#5F5E5A','#A32D2D'];

// Default basis gewerke
const BASIS = [
  'Maurer / -in','Zimmerer / -in','Betonbauer / -in','Stahlbau',
  'Elektriker / -in','Sanitär / HZG','Trockenbau',
  'Maler / -in','Fliesen / Estrich','Schreiner / Tischler','Bodenbelag',
  'Dachdecker / -in','Gerüstbau','Garten / Außen','Allgemeiner Helfer / -in'
];

let gewerke = [];   // [{id, name, minPersons, color}]
let ganttGewerke = [];
let personCounts = {};
let editingId = null;
let selectedColor = COLORS[0];

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'dashboard.html'; return; }

  // Load gewerke
  try {
    const snap = await getDoc(doc(db, 'planung', 'gewerkeList'));
    if (snap.exists() && snap.data().gewerke?.length > 0) {
      gewerke = snap.data().gewerke;
    } else {
      // First time: init from basis
      gewerke = BASIS.map((name, i) => ({
        id: 'gw_' + i + '_' + Date.now(),
        name, minPersons: 1, color: COLORS[i % COLORS.length]
      }));
      await saveToFirebase();
    }
  } catch(e) { gewerke = []; }

  // Load gantt
  try {
    const snap2 = await getDoc(doc(db, 'planung', 'gantt'));
    ganttGewerke = snap2.exists() ? (snap2.data().gewerke || []) : [];
  } catch(e) { ganttGewerke = []; }

  // Count persons per gewerk
  try {
    const snap3 = await getDocs(collection(db, 'anmeldungen'));
    snap3.forEach(d => {
      const gw = d.data().gewerk;
      if (gw) personCounts[gw] = (personCounts[gw] || 0) + 1;
      // Also count from gewerke array
      (d.data().gewerke || []).forEach(g => {
        personCounts[g] = (personCounts[g] || 0) + 0; // just init
      });
    });
  } catch(e) {}

  render();
});

async function saveToFirebase() {
  await setDoc(doc(db, 'planung', 'gewerkeList'), {
    gewerke, savedAt: new Date().toISOString()
  });
}

function isGeplant(gw) {
  return ganttGewerke.some(g => g.gewerkId === gw.id || g.name === gw.name);
}

function getGanttDates(gw) {
  const g = ganttGewerke.find(g => g.gewerkId === gw.id || g.name === gw.name);
  return g ? { start: g.start, end: g.end } : null;
}

function render() {
  const content = document.getElementById('content');
  const ungeplant = gewerke.filter(g => !isGeplant(g)).length;

  let html = '';

  // Hint if any ungeplant
  if (ungeplant > 0) {
    html += `<div class="gantt-hint">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>${ungeplant} Gewerk${ungeplant !== 1 ? 'e' : ''} noch nicht im Gantt geplant. <a href="gantt.html">Zur Gantt-Planung →</a></span>
    </div>`;
  }

  html += '<div class="gewerk-list">';
  gewerke.forEach(gw => {
    const geplant = isGeplant(gw);
    const dates = getGanttDates(gw);
    const count = personCounts[gw.id] || 0;
    const dateStr = dates ? dates.start + ' – ' + dates.end : '';

    html += `<div class="gewerk-card">
      <div class="gewerk-color" style="background:${gw.color}"></div>
      <div class="gewerk-info">
        <div class="gewerk-name">${gw.name}</div>
        <div class="gewerk-meta">
          <span>Min. ${gw.minPersons} Person${gw.minPersons !== 1 ? 'en' : ''}</span>
          ${dateStr ? `<span>📅 ${dateStr}</span>` : ''}
        </div>
        <div class="gewerk-badges">
          <span class="badge ${geplant ? 'badge-geplant' : 'badge-ungeplant'}">
            ${geplant ? '✓ Im Gantt geplant' : '⚠ Noch nicht geplant'}
          </span>
          ${count > 0 ? `<span class="badge badge-personen">${count} Person${count !== 1 ? 'en' : ''} zugewiesen</span>` : ''}
        </div>
      </div>
      <div class="gewerk-actions">
        <button class="icon-btn" onclick="editGewerk('${gw.id}')" title="Bearbeiten">✎</button>
        <button class="icon-btn danger" onclick="confirmDelete('${gw.id}')" title="Löschen">✕</button>
      </div>
    </div>`;
  });
  html += '</div>';

  // Stats footer
  html += `<div style="font-size:12px;color:var(--muted);text-align:center;padding:8px">
    ${gewerke.length} Gewerke · ${gewerke.filter(g=>isGeplant(g)).length} geplant · ${gewerke.filter(g=>!isGeplant(g)).length} ungeplant
  </div>`;

  content.innerHTML = html;
}

// ── MODAL ──
function buildColorGrid(sel) {
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  COLORS.forEach(c => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (c === sel ? ' selected' : '');
    dot.style.background = c;
    dot.onclick = () => {
      document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
      dot.classList.add('selected');
      selectedColor = c;
    };
    grid.appendChild(dot);
  });
}

window.openModal = function() {
  editingId = null;
  document.getElementById('modal-title').textContent = 'Neues Gewerk';
  document.getElementById('m-name').value = '';
  document.getElementById('m-min').value = '1';
  document.getElementById('m-del').style.display = 'none';
  selectedColor = COLORS[gewerke.length % COLORS.length];
  buildColorGrid(selectedColor);
  document.getElementById('modal').classList.add('open');
  setTimeout(() => document.getElementById('m-name').focus(), 100);
};

window.editGewerk = function(id) {
  const gw = gewerke.find(g => g.id === id);
  if (!gw) return;
  editingId = id;
  document.getElementById('modal-title').textContent = gw.name + ' bearbeiten';
  document.getElementById('m-name').value = gw.name;
  document.getElementById('m-min').value = gw.minPersons || 1;
  document.getElementById('m-del').style.display = 'block';
  selectedColor = gw.color;
  buildColorGrid(selectedColor);
  document.getElementById('modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('modal').classList.remove('open');
  editingId = null;
};

window.saveGewerk = async function() {
  const name = document.getElementById('m-name').value.trim();
  const min = parseInt(document.getElementById('m-min').value) || 1;
  if (!name) { alert('Bitte einen Namen eingeben.'); return; }

  if (editingId) {
    const gw = gewerke.find(g => g.id === editingId);
    if (gw) { gw.name = name; gw.minPersons = min; gw.color = selectedColor; }
  } else {
    gewerke.push({ id: 'gw_' + Date.now(), name, minPersons: min, color: selectedColor });
  }

  await saveToFirebase();
  closeModal();
  render();
};

window.confirmDelete = function(id) {
  editingId = id;
  deleteGewerk();
};

window.deleteGewerk = async function() {
  if (!editingId) return;
  const gw = gewerke.find(g => g.id === editingId);
  if (!confirm(`"${gw?.name}" wirklich löschen?`)) return;
  gewerke = gewerke.filter(g => g.id !== editingId);
  await saveToFirebase();
  closeModal();
  render();
};
</script>
</body>
</html>
