<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Gemeindebau Dashboard</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --clay: #C4855A;
    --clay-light: #E8C4A8;
    --clay-pale: #F5EAE0;
    --clay-dark: #8B5E3C;
    --sand: #F7F0E8;
    --text: #2C1F14;
    --text-muted: #7A6555;
    --white: #FFFFFF;
    --green: #4A7C59;
    --green-light: #E8F2EB;
    --red: #C0392B;
    --red-light: #FDECEA;
    --mine: #3A6B9C;
    --mine-light: #E3EEF7;
    --radius: 16px;
    --shadow-sm: 0 2px 8px rgba(44,31,20,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* NAV */
  .nav { display: flex; gap: 6px; padding: 8px 12px; background: var(--white); border-bottom: 1px solid var(--clay-pale); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow-sm); align-items: center; }
  .nav-btn { flex: 1; padding: 7px 0; border: 1.5px solid var(--clay-pale); border-radius: 10px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; }
  .nav-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .nav-btn.active { background: var(--clay); border-color: var(--clay); color: var(--white); }
  .help-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--clay-pale); background: var(--white); color: var(--clay-dark); font-size: 15px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; font-weight: 700; font-family: 'DM Sans', sans-serif; transition: all .2s; }
  .refresh-btn { width: 34px; height: 34px; border-radius: 50%; border: 1.5px solid var(--clay-pale); background: var(--white); color: var(--clay-dark); font-size: 16px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; transition: all .2s; }
  .refresh-btn:active { background: var(--sand); }
  .refresh-btn.spinning { animation: spin .7s linear infinite; pointer-events: none; }
  @keyframes spin { to { transform: rotate(-360deg); } }
  .help-btn:active { background: var(--clay-pale); }

  /* VIEWS */
  .view { display: none; padding: 16px; animation: fadeUp .3s ease; }
  .view.active { display: block; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  /* OVERLAY */
  .overlay { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(28,27,24,0.45); backdrop-filter: blur(2px); }
  .overlay.visible { display: flex; align-items: flex-end; }
  .sheet { width: 100%; background: var(--white); border-radius: 12px 12px 0 0; padding: 0 0 36px; animation: slideUp .25s cubic-bezier(.2,.8,.3,1); max-height: 88vh; overflow-y: auto; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .sheet-close { background: none; border: none; color: var(--text-muted); font-size: 20px; line-height: 1; cursor: pointer; padding: 0; flex-shrink: 0; }

  /* NEWS */
  .news-header { background: var(--white); border-radius: 12px 12px 0 0; padding: 15px 18px; border-bottom: 1px solid var(--clay-pale); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .news-header-title { font-family: 'DM Sans', sans-serif; font-style: normal; font-size: 15px; font-weight: 700; color: var(--text); }
  .news-header-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .news-list { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 8px; }
  .news-card { background: var(--sand); border-radius: 8px; padding: 11px 14px; border-left: 3px solid var(--clay); }
  .news-date { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; letter-spacing: .4px; text-transform: uppercase; }
  .news-text { font-size: 14px; line-height: 1.55; }

  /* NEWS PILL */
  .news-pill { display: flex; align-items: center; gap: 8px; background: var(--white); color: var(--text); border: 1px solid var(--clay-pale); border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .news-pill-dot { width: 7px; height: 7px; background: var(--clay); border-radius: 50%; flex-shrink: 0; }
  .news-pill-text { font-size: 13px; font-weight: 600; flex: 1; }
  .news-pill-count { background: var(--clay-pale); color: var(--clay-dark); border-radius: 8px; padding: 2px 8px; font-size: 12px; font-weight: 700; }
  .news-pill-arrow { font-size: 14px; color: var(--text-muted); }

  /* CARD */
  .card { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); margin-bottom: 14px; }
  .card-header { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .card-header-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--clay-pale); display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .card-title { font-weight: 600; font-size: 15px; flex: 1; }
  .card-chevron { color: var(--text-muted); font-size: 12px; transition: transform .2s; }
  .card.collapsed .card-chevron { transform: rotate(-90deg); }
  .card.collapsed .card-body { display: none; }
  .card-body { margin-top: 14px; }
  .card-header-meta { display: flex; align-items: center; gap: 6px; }
  .team-badge { background: var(--clay-pale); color: var(--clay-dark); border-radius: 8px; padding: 3px 9px; font-size: 12px; font-weight: 600; }

  /* INFO ROWS */
  .info-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--clay-pale); gap: 10px; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 13px; color: var(--text-muted); width: 100px; flex-shrink: 0; }
  .gewerk-tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .gewerk-tag { border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 600; background: var(--clay-pale); color: var(--clay-dark); }
  .gewerk-tag.mine { background: var(--mine); color: var(--white); }

  /* ICON BUTTONS */
  .icon-btn { width: 34px; height: 34px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: transform .15s; flex-shrink: 0; text-decoration: none; -webkit-text-decoration: none; }
  .icon-btn:active { transform: scale(.88); }
  .btn-call { background: var(--green-light); color: var(--green); }
  .btn-tg   { background: #E3F2FD; color: #1976D2; }

  /* DAY BLOCKS */
  .kw-sep { font-size: 11px; font-weight: 700; color: var(--clay); letter-spacing: .5px; text-transform: uppercase; margin: 12px 0 7px; display: flex; align-items: center; gap: 6px; }
  .kw-sep:first-child { margin-top: 0; }
  .kw-sep::after { content: ''; flex: 1; height: 1px; background: var(--clay-pale); display: inline-block; }
  .day-block { margin-bottom: 12px; }
  .day-label { font-size: 13px; font-weight: 700; color: var(--clay-dark); margin-bottom: 6px; padding-left: 2px; }

  .gewerk-row { display: flex; align-items: center; gap: 7px; padding: 7px 10px; margin-bottom: 5px; border-radius: 10px; background: var(--sand); }
  .gewerk-row:last-child { margin-bottom: 0; }
  .gewerk-row.mine-row { background: var(--mine-light); border: 1px solid rgba(58,107,156,0.18); }
  .gewerk-row-name { font-size: 13px; font-weight: 600; flex: 1; color: var(--text); }
  .gewerk-row.mine-row .gewerk-row-name { color: var(--mine); }
  .need-badge { font-size: 11px; font-weight: 700; border-radius: 6px; padding: 3px 7px; flex-shrink: 0; white-space: nowrap; color: var(--red); background: var(--red-light); }
  .need-badge.ok { color: var(--green); background: var(--green-light); }
  .action-btn { border: 1.5px solid; border-radius: 9px; padding: 5px 11px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .2s; flex-shrink: 0; white-space: nowrap; }
  .btn-join { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .btn-join.done { background: var(--green); color: var(--white); border-color: var(--green); }
  @keyframes popIn { 0%{transform:scale(.8)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .btn-join.done { animation: popIn .3s ease; }

  /* INFOS VIEW */
  .section-title { font-size: 11px; font-weight: 700; color: var(--clay); letter-spacing: .6px; text-transform: uppercase; margin: 16px 0 8px; display: flex; align-items: center; gap: 6px; }
  .section-title:first-child { margin-top: 0; }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--clay-pale); }
  .search-wrap { margin-bottom: 12px; }
  .search-input { width: 100%; box-sizing: border-box; padding: 9px 12px; border-radius: 10px; border: 1.5px solid var(--clay-pale); background: var(--white); font-size: 13px; color: var(--text-main); outline: none; }
  .search-input:focus { border-color: var(--clay); }
  .search-input::placeholder { color: var(--text-muted); }
  .contact-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--white); border-radius: 12px; margin-bottom: 8px; box-shadow: var(--shadow-sm); }
  .contact-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--clay-pale); color: var(--clay-dark); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .contact-avatar.lead { background: var(--clay); color: var(--white); }
  .contact-info { flex: 1; }
  .contact-name { font-size: 13px; font-weight: 600; }
  .contact-role { font-size: 11px; color: var(--text-muted); }
  .contact-actions { display: flex; gap: 6px; }

  /* BAUSTATUS */
  .bau-hero { background: linear-gradient(135deg, var(--clay-dark), var(--clay)); border-radius: var(--radius); padding: 20px 20px 16px; color: var(--white); margin-bottom: 14px; }
  .bau-pct { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; line-height: 1; }
  .bau-sub { font-size: 13px; opacity: .75; margin-top: 4px; }
  .bau-bar-wrap { background: rgba(255,255,255,.2); border-radius: 8px; height: 8px; margin-top: 14px; overflow: hidden; }
  .bau-bar-fill { height: 100%; background: var(--white); border-radius: 8px; width: 0; transition: width 1.4s cubic-bezier(.4,0,.2,1); }
  .building-stage { background: var(--white); border-radius: var(--radius); padding: 20px 16px; box-shadow: var(--shadow-sm); margin-bottom: 14px; }
  .block-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 16px; }
  .building-svg-wrap { display: flex; justify-content: center; height: 180px; }
  .building-svg-wrap svg { width: 100%; max-width: 320px; height: 180px; }
  .milestone-timeline { background: var(--white); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-sm); }
  .tl-items { position: relative; padding-left: 24px; }
  .tl-items::before { content: ''; position: absolute; left: 9px; top: 6px; bottom: 6px; width: 2px; background: var(--clay-pale); }
  .tl-item { display: flex; flex-direction: column; margin-bottom: 14px; position: relative; }
  .tl-item:last-child { margin-bottom: 0; }
  .tl-dot { position: absolute; left: -19px; top: 3px; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; border: 2px solid var(--white); }
  .tl-dot.done   { background: var(--green); color: var(--white); box-shadow: 0 0 0 1.5px var(--green); }
  .tl-dot.active { background: var(--clay); color: var(--white); box-shadow: 0 0 0 1.5px var(--clay); }
  .tl-dot.future { background: #F0EFED; color: #AAA; box-shadow: 0 0 0 1.5px #DDD; }
  .tl-name { font-size: 13px; font-weight: 600; }
  .tl-date { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .tl-tag { font-size: 10px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; border-radius: 5px; padding: 2px 6px; margin-top: 3px; display: inline-block; align-self: flex-start; }
  .tag-done   { background: var(--green-light); color: var(--green); }
  .tag-active { background: var(--clay-pale); color: var(--clay-dark); }
  .tag-future { background: #F0EFED; color: #AAA; }

  /* HELP OVERLAY */
  .help-header { background: var(--white); border-radius: 12px 12px 0 0; padding: 15px 18px; border-bottom: 1px solid var(--clay-pale); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .help-header-title { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
  .help-content { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
  .help-block { background: var(--sand); border-radius: 8px; padding: 12px 14px; border: 1px solid var(--clay-pale); }
  .help-block-title { font-weight: 700; font-size: 12px; color: var(--clay-dark); margin-bottom: 10px; letter-spacing: .4px; text-transform: uppercase; }
  .orga-card { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .orga-card:last-child { margin-bottom: 0; }
  .orga-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--clay); color: var(--white); display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; flex-shrink: 0; }
  .orga-info { flex: 1; }
  .orga-name { font-size: 14px; font-weight: 600; }
  .orga-role { font-size: 11px; color: var(--text-muted); }
  .orga-actions { display: flex; gap: 6px; }

  /* KW TABLE */
  .kw-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .kw-table th { background: var(--clay-pale); padding: 6px 10px; text-align: left; font-weight: 700; color: var(--clay-dark); }
  .kw-table th:first-child { border-radius: 6px 0 0 6px; }
  .kw-table th:last-child  { border-radius: 0 6px 6px 0; }
  .kw-table td { padding: 7px 10px; border-bottom: 1px solid var(--clay-pale); }
  .kw-table tr:last-child td { border-bottom: none; }
  .kw-table tr.cur td { background: rgba(196,133,90,0.09); font-weight: 600; }
  .kw-badge { background: var(--clay); color: var(--white); border-radius: 5px; padding: 1px 6px; font-weight: 700; font-size: 11px; }
  .mine-kw { color: var(--mine); font-weight: 700; }

  /* MESSAGE */
  .message-field { width: 100%; background: var(--white); border: 1.5px solid var(--clay-pale); border-radius: 10px; padding: 10px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); resize: none; min-height: 90px; outline: none; transition: border-color .2s; }
  .message-field:focus { border-color: var(--clay); }
  .message-send { margin-top: 8px; width: 100%; background: var(--clay); color: var(--white); border: none; border-radius: 10px; padding: 11px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .2s; }
  .message-send:active { background: var(--clay-dark); }
  .message-send.sent { background: var(--green); }

  /* EINSATZ CHIPS */
  .einsatz-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .day-block { background: white; border: 1px solid var(--clay-pale); border-radius: 8px; padding: 7px 10px 6px; margin-bottom: 6px; }
  .day-block-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
  .day-block-label { font-size: 11px; font-weight: 700; color: var(--clay-dark); letter-spacing: .2px; }
  .day-need-badge { font-size: 10px; font-weight: 700; color: var(--red); background: var(--red-light); border-radius: 6px; padding: 2px 7px; white-space: nowrap; }
  .day-block-chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .einsatz-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 10px; background: var(--sand); border: 1.5px solid var(--clay-pale); cursor: pointer; user-select: none; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .einsatz-chip.mine { background: var(--mine-light); border-color: rgba(58,107,156,0.25); }
  .einsatz-chip.signed { background: var(--green-light) !important; border-color: var(--green) !important; }
  .einsatz-chip:active { transform: scale(.95); }
  .chip-name { font-size: 12px; font-weight: 600; color: var(--text); }
  .einsatz-chip.mine .chip-name { color: var(--mine); }
  .einsatz-chip.signed .chip-name { color: var(--green); }
  .chip-state { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-left: 1px; }
  .einsatz-chip.signed .chip-state { color: var(--green); }
  .einsatz-chip .need-badge { background: none !important; padding: 0; font-size: 10px; font-weight: 700; color: inherit; opacity: .7; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--clay-light); border-radius: 4px; }

  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,30,30,.9); color: white; font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 20px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; white-space: nowrap; z-index: 9999; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="toast"></div>
<nav class="nav">
  <!-- Dashboard: Werkzeug -->
  <button class="nav-btn active" onclick="showView('dashboard',this)" title="Dashboard">
    <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
  </button>
  <!-- Ansprechpartner: Personen -->
  <button class="nav-btn" onclick="showView('infos',this)" title="Ansprechpartner">
    <svg viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/><path d="M21 21v-2a4 4 0 0 0-3-3.87"/></svg>
  </button>
  <!-- Küche: Besteck -->
  <button class="nav-btn" id="nav-bk" style="display:none" onclick="showView('baukueche',this)" title="Küche">
    <svg viewBox="0 0 24 24"><path d="M3 2v7c0 1.66 1.34 3 3 3s3-1.34 3-3V2"/><line x1="6" y1="2" x2="6" y2="22"/><path d="M21 2v4a4 4 0 0 1-4 4v12"/></svg>
  </button>
  <!-- Teamleiter: Clipboard -->
  <button class="nav-btn" id="nav-tl" style="display:none" onclick="showView('teamleiter',this)" title="Teamleiter">
    <svg viewBox="0 0 24 24"><rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
  </button>
  <!-- Orga: Schieberegler -->
  <button class="nav-btn" id="nav-adm" style="display:none" onclick="showView('admin',this)" title="Orga">
    <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/><circle cx="8" cy="6" r="2" fill="currentColor" stroke="none"/><circle cx="16" cy="12" r="2" fill="currentColor" stroke="none"/><circle cx="10" cy="18" r="2" fill="currentColor" stroke="none"/></svg>
  </button>
  <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()" title="Aktualisieren">↺</button>
  <button class="help-btn" onclick="openHelp()">?</button>
</nav>

<!-- ══════════ DASHBOARD ══════════ -->
<div class="view active" id="view-dashboard">

  <div class="news-pill" id="news-pill" onclick="openNews()">
    <div class="news-pill-dot"></div>
    <div class="news-pill-text">Neuigkeiten / Informationen</div>
    <div class="news-pill-arrow">›</div>
  </div>

  <!-- Mein Team -->
  <div class="card collapsed" id="card-team">
    <div class="card-header" onclick="toggleCard('card-team')">
      <div class="card-header-icon">👥</div>
      <div class="card-title">Mein Team</div>
      <div class="card-header-meta">
        <span class="team-badge" id="team-badge">–</span>
        <span class="card-chevron">▼</span>
      </div>
    </div>
    <div class="card-body" id="team-body">
      <div style="color:var(--text-muted);font-size:13px">Wird geladen …</div>
    </div>
  </div>

  <!-- Meine Einsätze -->
  <div class="card" id="card-einsaetze">
    <div class="card-header" onclick="toggleCard('card-einsaetze')">
      <div class="card-header-icon">📅</div>
      <div class="card-title">Meine Einsätze</div>
      <span class="card-chevron">▼</span>
    </div>

const MY_GRUPPE  = 1;
const MY_GEWERKE = ['Rohbau', 'Mauerwerk'];

// ── KW Formel: 3er-Zyklus ──
function gruppenFuerKW(kw) {
  const r = ((kw - 1) % 3) + 1;
  return r === 1 ? [1,2] : r === 2 ? [2,3] : [1,3];
}
function currentKW() {
  const d = new Date(), y = d.getFullYear();
  const start = new Date(y, 0, 1);
  return Math.ceil(((d - start) / 86400000 + start.getDay() + 1) / 7);
}

// ── KW Tabelle ──
function renderKWTable(meineGruppe) {
  const now  = new Date();
  const cur  = currentKW();
  const fmt  = d => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;

  // Gruppe-Badge oben rechts
  const badge = document.getElementById('kw-gruppe-badge');
  if (badge) {
    if (meineGruppe) {
      badge.textContent = 'Gruppe ' + meineGruppe;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }

  let html = '<tr><th>KW</th><th>Gruppen</th></tr>';
  for (let i = -1; i <= 5; i++) {
    const kw    = cur + i;
    const year  = now.getFullYear();
    const mon   = kwToMonday(year, kw);
    const sun   = new Date(mon); sun.setDate(mon.getDate() + 6);
    const dates = `<span style="color:var(--text-muted);font-size:10px"> (${fmt(mon)}–${fmt(sun)})</span>`;
    const gr    = gruppenFuerKW(kw);
    const isCur = i === 0;
    const meineAktiv = meineGruppe && gr.includes(meineGruppe);

    const kwCell = isCur
      ? `<span class="kw-badge">KW ${kw}</span>${dates} ← jetzt`
      : `KW ${kw}${dates}`;

    const grCell = [1,2,3].map(g => {
      const active = gr.includes(g);
      const mine   = meineGruppe && g === meineGruppe;
      const color  = active ? 'var(--green)' : 'var(--clay-light)';
      return `<span style="font-weight:${mine?'700':'500'};color:${color}">${g}</span>`;
    }).join(' &nbsp; ');

    const rowBg = meineAktiv ? `background:var(--green-light)` : '';
    const rowClass = isCur ? 'cur' : '';
    html += `<tr class="${rowClass}" style="${rowBg}"><td>${kwCell}</td><td>${grCell}</td></tr>`;
  }
  document.getElementById('kw-table').innerHTML = html;
}

}

function renderDayList(containerId, filterMine) {
  const body = document.getElementById(containerId);

  let lastKW = '';
  let idx = 0;
  tage.forEach((tag, ti) => {

    if (!gewerke.length) return;
    if (tag.kw !== lastKW) {
      html += `<div class="kw-sep">${tag.kw}</div>`;
      lastKW = tag.kw;
    }
    html += `<div class="day-block"><div class="day-label">${tag.datum}</div>`;
    gewerke.forEach(g => {
      const key = `${containerId}-${ti}-${g.n.replace(/\s/g,'')}`;
      const isMine = MY_GEWERKE.includes(g.n);
      const badgeCls = g.f > 0 ? '' : ' ok';
      const badgeTxt = g.f > 0 ? `${g.f} ${filterMine?'offen':'fehlen'}` : (filterMine?'Besetzt':'Besetzt ✓');
      html += `<div class="gewerk-row ${isMine?'mine-row':''}" >
        <span class="gewerk-row-name">${g.n}</span>
        <span class="need-badge${badgeCls}" id="nb-${key}">${badgeTxt}</span>
        <button class="action-btn btn-join" id="jb-${key}" onclick="join('${key}',${ti},'${g.n}','${containerId}')">
          ${filterMine?'Anmelden':'Ich kann!'}
        </button>
      </div>`;
    });
    html += '</div>';
  });
  body.innerHTML = html;
}

// Helfer benötigt wird dynamisch via loadUserData() befüllt

function join(key, ti, gName, src) {
  const btn = document.getElementById('jb-'+key);
  const badge = document.getElementById('nb-'+key);
  btn.textContent = 'Angemeldet ✓';
  btn.classList.add('done');
  btn.disabled = true;
  const g = tage[ti].gewerke.find(x => x.n === gName);
  if (g && g.f > 0) {
    g.f--;
    const filterMine = src === 'einsaetze-body';

    else badge.textContent = g.f + (filterMine?' offen':' fehlen');
  }
}

}

window._bedarfData = {}; // ns → { tage, anmMap }

window._setBedarf = async (ns, docId, iso, gwId, val) => {
  const bedarf = val === '' ? null : Number(val);

  });

window._setStandardBedarf = async (ns, gwId, inputId) => {
  const inputEl = document.getElementById(inputId);
  const val = inputEl?.value;
  if (val === '' || val == null) return;
  const bedarf = Number(val);
  const d = window._bedarfData[ns]; if (!d) return;

  // 1. Standard in bedarf_config speichern
  const { error: cfgErr } = await supabase.from('bedarf_config').upsert({ id: gwId, bedarf });
  if (cfgErr) { console.error(cfgErr); return; }

  // 2. Alle Tage im Gantt-Zeitraum des Gewerks beschreiben (nicht nur 14 Tage)
  const heute = new Date(); heute.setHours(0,0,0,0);
  const gwBars = (window._allBars || []).filter(b => b.gewerkId === gwId);
  const allFutureDates = [];
  gwBars.forEach(bar => {
    const s = parseLocalDate(bar.start), e = parseLocalDate(bar.end);
    if (!s || !e) return;
    const from = s < heute ? heute : s;
    const cur = new Date(from);
    while (cur <= e) {
      if (cur.getDay() !== 0) {
        allFutureDates.push(`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`);
      }
      cur.setDate(cur.getDate() + 1);
    }
  });

  await Promise.all(allFutureDates.map(async iso => {
    const docId = `${iso}_${gwId}`;
    const existing = d.anmMap[docId] || { angemeldete: {} };
    await supabase.from('einsatz_anmeldungen').upsert({
      id: docId, date: iso, gewerk_id: gwId,
      angemeldete: existing.angemeldete || {}, bedarf
    });
    d.anmMap[docId] = { ...(d.anmMap[docId] || {}), bedarf };
    const count = Object.keys(existing.angemeldete || {}).length;
    const badge = document.getElementById(`bdg-${ns}-${docId}`);
    if (badge) badge.innerHTML = bedarfBadgeUser(count, bedarf);
    const inp = document.getElementById(`inp-${ns}-${docId}`);
    if (inp) { inp.value = ''; inp.placeholder = String(bedarf); }
  }));

  if (inputEl) { inputEl.value = ''; inputEl.placeholder = String(bedarf); }
};

window._saveGanttKW = async (barId, sKWId, sYrId, eKWId, eYrId, btn) => {
  const read = id => { const el = document.getElementById(id); return parseInt(el?.value || el?.placeholder); };
  const sKW = read(sKWId), sYr = read(sYrId), eKW = read(eKWId), eYr = read(eYrId);

    );
    const { error: saveErr } = await supabase.from('gantt_daten').update({ gewerke: updated }).eq('id', 'main');
    if (saveErr) throw new Error(saveErr.message);
    window._allBars = updated;

    // Standard-Bedarf für neue Tage übernehmen
    if (gwId) {
      const { data: cfgRow } = await supabase.from('bedarf_config').select('bedarf').eq('id', gwId).maybeSingle();
      const bedarf = cfgRow?.bedarf ?? null;
      if (bedarf !== null) {
        const heute = new Date(); heute.setHours(0,0,0,0);
        const from  = startMon < heute ? heute : startMon;
        const cur   = new Date(from);
        while (cur <= endSun) {
          if (cur.getDay() !== 0) {
            const iso   = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
            const docId = `${iso}_${gwId}`;
            await supabase.from('einsatz_anmeldungen').upsert({
              id: docId, date: iso, gewerk_id: gwId, bedarf
            });
          }
          cur.setDate(cur.getDate() + 1);
        }
      }
    }

    btn.textContent = 'Gespeichert ✓';
    setTimeout(() => { btn.textContent = 'Speichern'; btn.disabled = false; }, 2500);
  } catch(e) {
    alert('Fehler beim Speichern: ' + e.message);
    btn.textContent = 'Speichern'; btn.disabled = false;
  }
};

function bedarfBadgeUser(count, bedarf) {
  if (!bedarf) return `<span class="need-badge${count>0?' ok':''}">${count} angemeldet</span>`;
  const fehlen = bedarf - count;
  if (fehlen <= 0) return `<span class="need-badge ok">${count}/${bedarf} ✓</span>`;
  return `<span class="need-badge">${count}/${bedarf} · ${fehlen} fehlen</span>`;
}
function bedarfBadgeMine(count, bedarf) {
  if (!bedarf) return `<span class="need-badge${count>0?' ok':''}">${count} angemeldet</span>`;
  if (count >= bedarf) return `<span class="need-badge ok">${count}/${bedarf} ✓</span>`;
  return `<span class="need-badge">${count}/${bedarf}</span>`;
}

      if (d.sonderrolle && SONDERROLLEN_LABELS[d.sonderrolle])
        parts.push(SONDERROLLEN_LABELS[d.sonderrolle]);

// ── Helpers ──
function parseLocalDate(str) {
  if (!str || typeof str !== 'string') return null;
  const p = str.split('-');
  return new Date(+p[0], +p[1]-1, +p[2]);
}
function isoWeek(d) {
  const tmp = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  tmp.setDate(tmp.getDate() + 4 - (tmp.getDay() || 7));
  const y1 = new Date(tmp.getFullYear(), 0, 1);
  return Math.ceil(((tmp - y1) / 86400000 + 1) / 7);
}
function kwToMonday(year, kw) {
  // ISO: Montag der angegebenen KW im Jahr year
  const jan4 = new Date(year, 0, 4);
  const dow  = (jan4.getDay() + 6) % 7; // 0=Mo..6=So
  const mon  = new Date(jan4);
  mon.setDate(jan4.getDate() - dow + (kw - 1) * 7);
  return mon;
}
window.kwToMonday = kwToMonday;
function dateToISO(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
window.dateToISO = dateToISO;
function gruppeAktivInKW(gruppe, kw) {
  const r = ((kw - 1) % 3) + 1;
  const aktiv = r === 1 ? [1,2] : r === 2 ? [2,3] : [1,3];
  return aktiv.includes(gruppe);
}
function fmtDateDE(d) {
  return d.toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit' });
}

            <span id="bdg-${ns}-${docId}">${bedarfBadgeUser(count, bed || null)}</span>

              style="width:52px;font-size:12px;border:1px solid var(--clay-pale);border-radius:8px;padding:4px 6px;text-align:center;font-family:'DM Sans',sans-serif;outline:none"
              onkeydown="if(event.key==='Enter'){event.preventDefault();window._setBedarf('${ns}','${docId}','${iso}','${gwId}',this.value);this.blur()}"
              onchange="window._setBedarf('${ns}','${docId}','${iso}','${gwId}',this.value)">
            <span style="font-size:18px;color:var(--clay-dark);cursor:pointer"
              onclick="window._showAnmeldungen('${ns}','${docId}','${dayLbl}','${gwName}')">›</span>
          </div>`;
        });
        html += `</div></div>`;
      });
      return html || '<div style="color:var(--text-muted);font-size:13px">Keine Gewerke zugewiesen.</div>';
    }

    // ── Teamleiter-Tab ──
    const isTL    = userDoc?.rolle === 'teamleiter';
    const isAdmin = userDoc?.admin === true;
    const isOrga  = userDoc?.sonderrolle === 'organisation';
    const isBK    = userDoc?.sonderrolle === 'bauküche';
    if (isTL || isOrga || isAdmin) {

        renderBedarfCards('tl', tlGewerke, tlTage, tlAnmMap) +

    // ── Admin-Tab ──
    if (isOrga || isAdmin) {
      document.getElementById('nav-adm').style.display = '';
      const admGewerke = Object.keys(gewerkeMap);
      const [{ tage: admTage, allDays: admAllDays, anmMap: admAnmMap }, { data: allUsers }] = await Promise.all([
        loadBedarfData(admGewerke),

      window._bedarfData['adm'] = { tage: admTage, anmMap: admAnmMap };
      window._admUsers = allUsers || [];

      window._admSearchQuery = '';
      window._renderPersonenListe = (q) => {
        if (q !== undefined) window._admSearchQuery = q;

        let users = window._admUsers;

          const isAct = u.dashboard_aktiv;
          const gruppe = u.gruppe ? `Gr. ${u.gruppe}` : '';
          const gwCount = (u.gewerke_zugewiesen || []).length;
          const gwLabel = gwCount ? `${gwCount} Gewerk${gwCount>1?'e':''}` : '';
          const meta = [gruppe, gwLabel].filter(Boolean).join(' · ');
          return `<div style="padding:8px 0;border-bottom:1px solid var(--clay-pale)">
            <div style="display:flex;align-items:center;gap:6px">

                <div style="font-size:13px;font-weight:500">${name}</div>
                ${meta ? `<div style="font-size:11px;color:var(--text-muted);margin-top:1px">${meta}</div>` : ''}
              </div>
              <button onclick="window._admOpenPersonEdit('${u.id}')"
                style="background:var(--sand);border:1px solid var(--clay-pale);border-radius:8px;padding:5px 10px;font-size:13px;cursor:pointer;flex-shrink:0">✎</button>

      };

      window._toggleDashboard = async (userId) => {
        const user = window._admUsers.find(u => u.id === userId);
        if (!user) return;
        const newVal = !user.dashboard_aktiv;
        const { error } = await supabase.from('users').update({ dashboard_aktiv: newVal }).eq('id', userId);
        if (error) { alert('Fehler: ' + error.message); return; }

      window._admOpenPersonEdit = (userId) => {

        window._admEditGruppe  = user.gruppe || null;
        window._admEditGewerke = new Set(user.gewerke_zugewiesen || []);
        // Gruppe buttons
        document.getElementById('person-edit-gruppe').innerHTML = [1,2,3].map(g => `
          <button onclick="window._admSelectGruppe(${g})" id="pe-gruppe-${g}"
            style="flex:1;padding:10px;border-radius:8px;font-size:15px;font-weight:700;
                   font-family:'DM Sans',sans-serif;cursor:pointer;border:2px solid;
                   ${user.gruppe===g ? 'background:var(--clay);color:white;border-color:var(--clay)' : 'background:white;color:var(--clay-dark);border-color:var(--clay-pale)'}">
            ${g}
          </button>`).join('');
        // Gewerke chips
        const gMap = window._gewerkeMapForEdit || {};
        const activeGw = Object.values(gMap).filter(g => g.active).sort((a,b) => a.sort_order - b.sort_order);
        document.getElementById('person-edit-gewerke').innerHTML = activeGw.map(g => {
          const sel = window._admEditGewerke.has(g.id);
          return `<div onclick="window._admToggleGewerk('${g.id}',this)" id="pe-gw-${g.id}"
            style="padding:5px 11px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;border:1.5px solid;
                   ${sel ? 'background:var(--mine);color:white;border-color:var(--mine)' : 'background:var(--sand);color:var(--text);border-color:var(--clay-pale)'}">
            ${g.name}
          </div>`;
        }).join('');
        document.getElementById('person-edit-overlay').classList.add('visible');
      };

      window._admSelectGruppe = (g) => {
        window._admEditGruppe = window._admEditGruppe === g ? null : g;
        [1,2,3].forEach(n => {
          const btn = document.getElementById('pe-gruppe-' + n);
          if (!btn) return;
          const act = n === window._admEditGruppe;
          btn.style.background   = act ? 'var(--clay)' : 'white';
          btn.style.color        = act ? 'white' : 'var(--clay-dark)';
          btn.style.borderColor  = act ? 'var(--clay)' : 'var(--clay-pale)';
        });
      };

      window._admToggleGewerk = (gwId, el) => {
        if (window._admEditGewerke.has(gwId)) {
          window._admEditGewerke.delete(gwId);
          el.style.background  = 'var(--sand)';
          el.style.color       = 'var(--text)';
          el.style.borderColor = 'var(--clay-pale)';
        } else {
          window._admEditGewerke.add(gwId);
          el.style.background  = 'var(--mine)';
          el.style.color       = 'white';
          el.style.borderColor = 'var(--mine)';
        }
      };

      window._admSavePerson = async () => {
        const userId = window._admEditUserId; if (!userId) return;
        const btn = document.querySelector('#person-edit-overlay .sheet button:last-child');
        if (btn) { btn.textContent = '…'; btn.disabled = true; }
        try {
          const { error } = await supabase.from('users').update({
            gruppe: window._admEditGruppe,
            gewerke_zugewiesen: [...(window._admEditGewerke || [])]
          }).eq('id', userId);
          if (error) throw new Error(error.message);
          const user = window._admUsers.find(u => u.id === userId);
          if (user) {
            user.gruppe = window._admEditGruppe;
            user.gewerke_zugewiesen = [...(window._admEditGewerke || [])];
          }
          closeOverlay('person-edit-overlay');
          window._renderPersonenListe();
        } catch(e) {
          alert('Fehler: ' + e.message);
          if (btn) { btn.textContent = 'Speichern'; btn.disabled = false; }
        }
      };

      // News-Verwaltung
      window._admNewsEditId = null;
      window._renderAdmNews = () => {
        document.getElementById('adm-news-list').innerHTML = _newsItems.length
          ? _newsItems.map(n => `
            <div style="background:var(--sand);border-radius:10px;padding:10px 12px;display:flex;align-items:flex-start;gap:8px">
              <div style="flex:1">
                <div style="font-size:11px;font-weight:600;color:var(--clay-dark);margin-bottom:3px">${n.datum||''}</div>
                <div style="font-size:13px;line-height:1.5">${(n.text||'').replace(/\n/g,'<br>')}</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
                <button onclick="window._admNewsEdit('${n.id}')"
                  style="background:none;border:1px solid var(--clay-pale);border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif">✎</button>
                <button onclick="window._admNewsDel('${n.id}')"
                  style="background:none;border:1px solid #fca5a5;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;color:#c0392b;font-family:'DM Sans',sans-serif">✕</button>
              </div>
            </div>`).join('')
          : '<div style="color:var(--text-muted);font-size:13px">Noch keine Einträge.</div>';
      };
      window._admNewsEdit = (id) => {
        const n = _newsItems.find(x => x.id === id); if (!n) return;
        window._admNewsEditId = id;
        document.getElementById('adm-news-datum').value = n.datum || '';
        document.getElementById('adm-news-text').value  = n.text  || '';
        document.getElementById('adm-news-form').style.display = '';
        document.getElementById('adm-news-form-title').textContent = 'Bearbeiten';
      };
      window._admNewsNew = () => {
        window._admNewsEditId = null;
        document.getElementById('adm-news-datum').value = new Date().toLocaleDateString('de-DE',{day:'numeric',month:'long',year:'numeric'});
        document.getElementById('adm-news-text').value  = '';
        document.getElementById('adm-news-form').style.display = '';
        document.getElementById('adm-news-form-title').textContent = 'Neue Meldung';
        document.getElementById('adm-news-text').focus();
      };
      window._admNewsCancel = () => {
        document.getElementById('adm-news-form').style.display = 'none';
      };
      window._admNewsSave = async () => {
        const datum = document.getElementById('adm-news-datum').value.trim();
        const text  = document.getElementById('adm-news-text').value.trim();
        if (!text) { alert('Bitte einen Text eingeben.'); return; }
        const saveBtn = document.querySelector('#adm-news-form button');
        if (saveBtn) { saveBtn.textContent = '…'; saveBtn.disabled = true; }
        try {
          const ts = Date.now();
          if (window._admNewsEditId) {
            const { error } = await supabase.from('neuigkeiten').update({ datum, text, ts }).eq('id', window._admNewsEditId);
            if (error) throw new Error(error.message);
            const idx = _newsItems.findIndex(x => x.id === window._admNewsEditId);
            if (idx >= 0) _newsItems[idx] = { ..._newsItems[idx], datum, text, ts };
          } else {
            const { data: newRow, error } = await supabase.from('neuigkeiten').insert({ datum, text, ts }).select('id').single();
            if (error) throw new Error(error.message);
            _newsItems.unshift({ id: newRow.id, datum, text, ts });
          }
          window._admNewsCancel();
          window._renderAdmNews();
          renderNewsOverlay();
        } catch(e) {
          alert('Fehler beim Speichern: ' + e.message);
          if (saveBtn) { saveBtn.textContent = 'Speichern'; saveBtn.disabled = false; }
        }
      };
      window._admNewsDel = async (id) => {
        if (!confirm('Meldung löschen?')) return;
        const { error } = await supabase.from('neuigkeiten').delete().eq('id', id);
        if (error) { alert('Fehler: ' + error.message); return; }
        _newsItems = _newsItems.filter(x => x.id !== id);
        window._renderAdmNews();
        renderNewsOverlay();
      };

      const inputStyle = 'width:100%;font-family:"DM Sans",sans-serif;font-size:13px;border:1px solid var(--clay-pale);border-radius:8px;padding:8px 10px;outline:none;background:white;box-sizing:border-box';
      document.getElementById('adm-view-body').innerHTML = `
        <input type="search" placeholder="🔍 Person suchen …"
          oninput="window._renderPersonenListe(this.value)"
          style="width:100%;padding:9px 12px;border-radius:10px;border:1.5px solid var(--clay-pale);
                 background:white;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;
                 margin-bottom:12px;box-sizing:border-box">
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none"
               onclick="window._toggleBedarfCard('adm-persons-pending','adm-persons-pending-chev')">
            <span style="font-size:14px;font-weight:700;flex:1;color:var(--text)">Noch nicht freigeschaltet</span>
            <span id="adm-persons-pending-badge" style="background:var(--clay-pale);color:var(--clay-dark);border-radius:8px;padding:2px 8px;font-size:12px;font-weight:600">0</span>
            <span id="adm-persons-pending-chev" style="color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;transform:rotate(-90deg)">▼</span>
          </div>
          <div id="adm-persons-pending" style="margin-top:8px;display:none"></div>
        </div>
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none"
               onclick="window._toggleBedarfCard('adm-persons-active','adm-persons-active-chev')">
            <span style="font-size:14px;font-weight:700;flex:1;color:var(--text)">Freigeschaltet</span>
            <span id="adm-persons-active-badge" style="background:var(--green-light);color:var(--green);border-radius:8px;padding:2px 8px;font-size:12px;font-weight:600">0</span>
            <span id="adm-persons-active-chev" style="color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;transform:rotate(-90deg)">▼</span>
          </div>
          <div id="adm-persons-active" style="margin-top:8px;display:none"></div>
        </div>
        <div class="card" style="margin-bottom:12px">
          <div style="display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none"
               onclick="window._toggleBedarfCard('adm-news-body','adm-news-chev')">
            <span style="font-size:14px;font-weight:700;flex:1;color:var(--text)">Neuigkeiten / Informationen</span>
            <button onclick="event.stopPropagation();window._admNewsNew()"
              style="background:var(--clay);color:white;border:none;border-radius:8px;padding:5px 12px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer">
              + Neu
            </button>
            <span id="adm-news-chev" style="color:var(--text-muted);font-size:12px;transition:transform .2s;flex-shrink:0;transform:rotate(-90deg)">▼</span>
          </div>
          <div id="adm-news-body" style="margin-top:12px;display:none">
            <div id="adm-news-form" style="display:none;background:var(--sand);border-radius:10px;padding:12px;margin-bottom:10px">
              <div style="font-size:12px;font-weight:600;margin-bottom:8px" id="adm-news-form-title">Neue Meldung</div>
              <input id="adm-news-datum" type="text" placeholder="Datum (z.B. 7. April 2026)" style="${inputStyle};margin-bottom:8px">
              <textarea id="adm-news-text" rows="3" placeholder="Text der Meldung …"
                style="${inputStyle};resize:vertical;min-height:70px;margin-bottom:10px"></textarea>
              <div style="display:flex;gap:8px">
                <button onclick="window._admNewsSave()"
                  style="background:var(--clay);color:white;border:none;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer">
                  Speichern
                </button>
                <button onclick="window._admNewsCancel()"
                  style="background:none;border:1px solid var(--clay-pale);border-radius:8px;padding:6px 12px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer">
                  Abbrechen
                </button>
              </div>
            </div>
            <div id="adm-news-list" style="display:flex;flex-direction:column;gap:8px"></div>
          </div>
        </div>
        <div style="font-size:11px;font-weight:700;color:var(--clay);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">Bedarf verwalten</div>
        ${renderBedarfCards('adm', admGewerke, admTage, admAnmMap)}
        ${renderBauhelferCard('adm', admAllDays, admAnmMap)}
      `;
      window._renderAdmNews();
      window._renderPersonenListe();
    }

    // ── Bauküche-Tab ──
    if (isTL || isBK || isOrga || isAdmin) {
      document.getElementById('nav-bk').style.display = '';

      const bkToday = new Date(); bkToday.setHours(0,0,0,0);
      const bkIn14  = new Date(bkToday); bkIn14.setDate(bkIn14.getDate() + 14);
      const bkDates = [];
      const bkCur   = new Date(bkToday);
      while (bkCur <= bkIn14) {
        if (bkCur.getDay() !== 0) {
          const iso     = dateToISO(bkCur);
          const dayBars = allBars.filter(bar => {
            const s = parseLocalDate(bar.start), e = parseLocalDate(bar.end);
            return s && e && bkCur >= s && bkCur <= e;
          });
          bkDates.push({ iso, date: new Date(bkCur), bars: dayBars });
        }
        bkCur.setDate(bkCur.getDate() + 1);
      }

      // Alle relevanten einsatzAnmeldungen-Dokumente laden
      const bkDocIds = new Set();
      bkDates.forEach(({ iso, bars }) => {
        bars.forEach(b => bkDocIds.add(`${iso}_${b.gewerkId}`));
        bkDocIds.add(`${iso}_bauhelfer`);
      });
      const bkAnmMap = {};
      await Promise.all([...bkDocIds].map(async docId => {
        const { data: row } = await supabase.from('einsatz_anmeldungen').select('angemeldete').eq('id', docId).maybeSingle();
        bkAnmMap[docId] = row?.angemeldete || {};
      }));

      const WD_BK = ['So','Mo','Di','Mi','Do','Fr','Sa'];
      let bkHtml = '', bkLastKW = '';
      bkDates.forEach(({ iso, date, bars }) => {
        const kw = 'KW ' + String(isoWeek(date)).padStart(2,'0');
        if (kw !== bkLastKW) { bkHtml += `<div class="kw-sep">${kw}</div>`; bkLastKW = kw; }
        // Unique User-IDs über alle Gewerke + Bauhelfer dieses Tages
        const uniqueIds = new Set();
        bars.forEach(bar => {
          Object.keys(bkAnmMap[`${iso}_${bar.gewerkId}`] || {}).forEach(id => uniqueIds.add(id));
        });
        Object.keys(bkAnmMap[`${iso}_bauhelfer`] || {}).forEach(id => uniqueIds.add(id));
        const count = uniqueIds.size;
        bkHtml += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          <span style="font-size:11px;font-weight:600;color:var(--clay-dark);white-space:nowrap;min-width:52px">${WD_BK[date.getDay()]}, ${fmtDateDE(date)}</span>
          <span style="font-size:20px;font-weight:700;color:var(--text);min-width:28px;text-align:right">${count}</span>
          <span style="font-size:11px;color:var(--text-muted)">${count === 1 ? 'Person' : 'Personen'}</span>
        </div>`;
      });
      document.getElementById('bk-body').innerHTML = bkHtml || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Einträge.</div>';
    }

    // ── Meine Einsätze ──
    if (!gruppe || !gewerke.length) {
      einsaetzeBody.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Noch keine Gruppe oder Gewerk zugewiesen.</div>';
      return;
    }

    const today = new Date(); today.setHours(0,0,0,0);
    const in14  = new Date(today); in14.setDate(in14.getDate() + 14);
    const WD    = ['So','Mo','Di','Mi','Do','Fr','Sa'];

    // Alle aktiven Tage (Mo–Sa) + passende Bars sammeln
    const meineTage = [], alleTage = []; // [{iso, date, bars}]
    const cur = new Date(today);
    while (cur <= in14) {
      if (cur.getDay() !== 0) { // kein Sonntag
        const kw  = isoWeek(cur);
        const iso = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
        const meineTagBars = [], alleTagBars = [];
        allBars.forEach(bar => {
          const s = parseLocalDate(bar.start), e = parseLocalDate(bar.end);
          if (!s || !e || cur < s || cur > e) return;
          if (gruppeAktivInKW(gruppe, kw) && gewerke.includes(bar.gewerkId)) meineTagBars.push(bar);
          alleTagBars.push(bar);
        });
        if (meineTagBars.length) meineTage.push({ iso, date: new Date(cur), bars: meineTagBars });
        if (alleTagBars.length)  alleTage.push({ iso, date: new Date(cur), bars: alleTagBars, kwNum: kw });
      }
      cur.setDate(cur.getDate() + 1);
    }

    // Alle KWs (in Reihenfolge) aus alleTage, mit Gruppen-Aktiv-Info
    const allKWList = [];
    { const seen = new Set();
      alleTage.forEach(({ date, kwNum }) => {
        const kwStr = 'KW ' + String(kwNum).padStart(2,'0');
        if (!seen.has(kwStr)) { seen.add(kwStr); allKWList.push({ kwNum, kwStr }); }
      });
    }

    // Anmeldungen direkt per Dokument-ID laden (kein Query-Index nötig)
    const anmeldungenMap = {}; // "iso_gewerkId" → { angemeldete: {[tgId]: name}, bedarf: n|null }
    const docIds = new Set();
    [...meineTage, ...alleTage].forEach(({ iso, bars }) => {
      bars.forEach(bar => docIds.add(`${iso}_${bar.gewerkId}`));
      docIds.add(`${iso}_bauhelfer`);
    });
    await Promise.all([...docIds].map(async docId => {
      const { data: row } = await supabase.from('einsatz_anmeldungen').select('*').eq('id', docId).maybeSingle();
      anmeldungenMap[docId] = row
        ? { angemeldete: row.angemeldete || {}, bedarf: row.bedarf ?? null }
        : { angemeldete: {}, bedarf: null };
    }));

    const myId   = String(tgId);
    const myName = userDoc ? ((userDoc.vorname||'') + ' ' + (userDoc.nachname||'')).trim() : 'Unbekannt';

    // Anmelden / Abmelden
    window._anmelden = async (iso, gewerkId, chipId, badgeId) => {
      const docId = `${iso}_${gewerkId}`;
      const rec   = anmeldungenMap[docId] || { angemeldete: {}, bedarf: null };
      const entry = rec.angemeldete;
      if (entry[myId]) delete entry[myId]; else entry[myId] = myName;
      const { error } = await supabase.from('einsatz_anmeldungen').upsert({
        id: docId, date: iso, gewerk_id: gewerkId, angemeldete: entry, bedarf: rec.bedarf
      });
      if (error) { console.error(error); return; }
      anmeldungenMap[docId] = rec;
      const count = Object.keys(entry).length;
      const chip  = document.getElementById(chipId);
      const badge = document.getElementById(badgeId);
      if (chip) {
        chip.classList.toggle('signed', !!entry[myId]);
        const s = chip.querySelector('.chip-state');
        if (s) s.textContent = entry[myId] ? '✓' : '+';
      }
      if (badge) badge.innerHTML = bedarfBadgeMine(count, rec.bedarf);
      // Helfer-Chip ausblenden wenn Bedarf gedeckt
      if (chip && document.getElementById('helfer-body')?.contains(chip) && rec.bedarf && count >= rec.bedarf)
        chip.style.display = 'none';
      // Meine Einsätze neu rendern damit An-/Abmeldungen sofort erscheinen
      window._renderMeineEinsaetze?.();
    };

    const ns = (nurMeine) => nurMeine ? 'e' : 'h';
    const renderRows = (tageArr, bodyEl, nurMeine) => {
      if (!tageArr.length) {
        bodyEl.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Einträge.</div>';
        return;
      }
      let html = '', lastKW = '';
      tageArr.forEach(({ iso, date, bars: dayBars }) => {
        const visibleBars = dayBars.filter(bar => {
          const rec = anmeldungenMap[`${iso}_${bar.gewerkId}`] || { angemeldete: {}, bedarf: null };
          if (nurMeine) return !!rec.bedarf;
          return !!rec.bedarf && (rec.bedarf - Object.keys(rec.angemeldete).length) > 0;
        });
        const kw = 'KW ' + String(isoWeek(date)).padStart(2,'0');

        // Keine offenen Spots: bei Helfer-Ansicht allgemeine Bauhelfer-Option zeigen
        if (!visibleBars.length) {
          if (nurMeine) return;
          const docId  = `${iso}_bauhelfer`;
          const rec    = anmeldungenMap[docId] || { angemeldete: {}, bedarf: null };
          const count  = Object.keys(rec.angemeldete).length;
          const istAn  = !!rec.angemeldete[myId];
          const chipId = `chip-h-${docId}`;
          const badgeId= `bdg-h-${docId}`;
          if (kw !== lastKW) { html += `<div class="kw-sep">${kw}</div>`; lastKW = kw; }
          html += `<div class="day-block">`;
          html += `<div class="day-block-header"><span class="day-block-label">${WD[date.getDay()]}, ${fmtDateDE(date)}</span></div>`;
          html += `<div class="day-block-chips">`;
          html += `<div class="einsatz-chip${istAn?' signed':''}" id="${chipId}"
            onclick="window._anmelden('${iso}','bauhelfer','${chipId}','${badgeId}')">
            <span class="chip-name">Bauhelfer</span>
            <span id="${badgeId}" style="font-size:10px;font-weight:700;color:inherit;opacity:.75">${bedarfBadgeMine(count, null)}</span>
            <span class="chip-state">${istAn?'✓':'+'}</span>
          </div></div></div>`;
          return;
        }

        // Gesamtbedarf über alle sichtbaren Bars dieses Tages
        let dayBedarf = 0, dayAngemeldet = 0;
        visibleBars.forEach(bar => {
          const r = anmeldungenMap[`${iso}_${bar.gewerkId}`] || { angemeldete: {}, bedarf: null };
          if (r.bedarf != null) { dayBedarf += r.bedarf; dayAngemeldet += Object.keys(r.angemeldete).length; }
        });
        const dayOffen = dayBedarf - dayAngemeldet;
        const dayBadgeHtml = dayOffen > 0
          ? `<span class="day-need-badge">${dayOffen}</span>` : '';

        if (kw !== lastKW) { html += `<div class="kw-sep">${kw}</div>`; lastKW = kw; }
        html += `<div class="day-block">`;
        html += `<div class="day-block-header"><span class="day-block-label">${WD[date.getDay()]}, ${fmtDateDE(date)}</span>${dayBadgeHtml}</div>`;
        html += `<div class="day-block-chips">`;

        visibleBars.forEach(bar => {
          const gw     = gewerkeMap[bar.gewerkId];
          const color  = gw?.color || bar.color || 'var(--clay)';
          const name   = gw?.name  || bar.name  || bar.gewerkId;
          const docId  = `${iso}_${bar.gewerkId}`;
          const rec    = anmeldungenMap[docId] || { angemeldete: {}, bedarf: null };
          const count  = Object.keys(rec.angemeldete).length;
          const istAn  = !!rec.angemeldete[myId];
          const isMine = gewerke.includes(bar.gewerkId);
          const chipId = `chip-${nurMeine?'e':'h'}-${docId}`;
          const badgeId= `bdg-${nurMeine?'e':'h'}-${docId}`;

          html += `<div class="einsatz-chip${isMine?' mine':''}${istAn?' signed':''}" id="${chipId}"
            onclick="window._anmelden('${iso}','${bar.gewerkId}','${chipId}','${badgeId}')">
            <span class="chip-name">${name}</span>
            <span id="${badgeId}" style="font-size:10px;font-weight:700;color:inherit;opacity:.75">${bedarfBadgeMine(count,rec.bedarf)}</span>
            <span class="chip-state">${istAn?'✓':'+'}</span>
          </div>`;
        });
        html += `</div></div>`;
      });
      bodyEl.innerHTML = html || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Einträge.</div>';
    };

    // Meine Einsätze: eigene Gruppe-Bars + persönliche Anmeldungen aus "Helfer benötigt"
    window._renderMeineEinsaetze = function renderMeineEinsaetze() {
      if (!allKWList.length) {
        einsaetzeBody.innerHTML = '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Einträge.</div>';
        return;
      }

      // Pro Tag Bars sammeln: (a) Gruppe-Bars mit Bedarf, (b) persönliche Anmeldungen
      const dayMap = {}; // iso → { date, kwNum, bars[] }
      alleTage.forEach(({ iso, date, bars: dayBars, kwNum }) => {
        const kn = kwNum || isoWeek(date);
        const gruppeAktiv = gruppe && gruppeAktivInKW(gruppe, kn);
        dayBars.forEach(bar => {
          const docId = `${iso}_${bar.gewerkId}`;
          const rec   = anmeldungenMap[docId] || { angemeldete: {}, bedarf: null };
          const istAn = !!rec.angemeldete[myId];
          const gruppeBar = gruppeAktiv && gewerke.includes(bar.gewerkId) && !!rec.bedarf;
          if (!gruppeBar && !istAn) return;
          if (!dayMap[iso]) dayMap[iso] = { date, kwNum: kn, bars: [] };
          if (!dayMap[iso].bars.find(b => b.gewerkId === bar.gewerkId))
            dayMap[iso].bars.push(bar);
        });
        // Allgemeine Bauhelfer-Anmeldung einschließen
        const bhRec = anmeldungenMap[`${iso}_bauhelfer`] || { angemeldete: {}, bedarf: null };
        if (bhRec.angemeldete[myId]) {
          if (!dayMap[iso]) dayMap[iso] = { date, kwNum: kn, bars: [] };
          if (!dayMap[iso].bars.find(b => b.gewerkId === 'bauhelfer'))
            dayMap[iso].bars.push({ gewerkId: 'bauhelfer', name: 'Bauhelfer' });
        }
      });

      const renderChips = (iso, date, dayBars) => {
        let dayBedarf = 0, dayAngemeldet = 0;
        dayBars.forEach(bar => {
          const r = anmeldungenMap[`${iso}_${bar.gewerkId}`] || { angemeldete: {}, bedarf: null };
          if (r.bedarf != null) { dayBedarf += r.bedarf; dayAngemeldet += Object.keys(r.angemeldete).length; }
        });
        const dayOffen = dayBedarf - dayAngemeldet;
        const dayBadgeHtml = dayOffen > 0 ? `<span class="day-need-badge">${dayOffen}</span>` : '';
        let h = `<div class="day-block"><div class="day-block-header"><span class="day-block-label">${WD[date.getDay()]}, ${fmtDateDE(date)}</span>${dayBadgeHtml}</div><div class="day-block-chips">`;
        dayBars.forEach(bar => {
          const gw     = gewerkeMap[bar.gewerkId];
          const name   = gw?.name || bar.name || bar.gewerkId;
          const docId  = `${iso}_${bar.gewerkId}`;
          const rec    = anmeldungenMap[docId] || { angemeldete: {}, bedarf: null };
          const count  = Object.keys(rec.angemeldete).length;
          const istAn  = !!rec.angemeldete[myId];
          const isMine = gewerke.includes(bar.gewerkId);
          const chipId = `chip-e-${docId}`;
          const badgeId= `bdg-e-${docId}`;
          h += `<div class="einsatz-chip${isMine?' mine':''}${istAn?' signed':''}" id="${chipId}"
            onclick="window._anmelden('${iso}','${bar.gewerkId}','${chipId}','${badgeId}')">
            <span class="chip-name">${name}</span>
            <span id="${badgeId}" style="font-size:10px;font-weight:700;color:inherit;opacity:.75">${bedarfBadgeMine(count,rec.bedarf)}</span>
            <span class="chip-state">${istAn?'✓':'+'}</span>
          </div>`;
        });
        return h + `</div></div>`;
      };

      let html = '';
      allKWList.forEach(({ kwNum, kwStr }) => {
        const gruppeAktiv = gruppe && gruppeAktivInKW(gruppe, kwNum);
        // Alle Tage dieser KW mit relevanten Bars
        const tageInKW = alleTage
          .filter(t => (t.kwNum || isoWeek(t.date)) === kwNum && dayMap[t.iso])
          .sort((a, b) => a.date - b.date);

        if (!gruppeAktiv && !tageInKW.length) {
          // Freie Woche ohne persönliche Anmeldungen
          html += `<div class="kw-sep">${kwStr}</div>`;
          html += `<div style="color:var(--text-muted);font-size:12px;padding:3px 2px 10px;font-style:italic">In dieser Woche ist deine Gruppe nicht geplant</div>`;
        } else if (!gruppeAktiv && tageInKW.length) {
          // Freie Woche, aber persönliche Anmeldungen vorhanden
          html += `<div class="kw-sep">${kwStr}</div>`;
          html += `<div style="color:var(--text-muted);font-size:12px;padding:3px 2px 6px;font-style:italic">In dieser Woche ist deine Gruppe nicht geplant</div>`;
          tageInKW.forEach(({ iso, date }) => html += renderChips(iso, date, dayMap[iso].bars));
        } else if (tageInKW.length) {
          // Aktive Woche mit Einträgen
          html += `<div class="kw-sep">${kwStr}</div>`;
          tageInKW.forEach(({ iso, date }) => html += renderChips(iso, date, dayMap[iso].bars));
        }
        // Aktive Woche ohne Einträge: KW komplett weglassen
      });
      einsaetzeBody.innerHTML = html || '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">Keine Einträge.</div>';
    };
    window._renderMeineEinsaetze();
    renderRows(alleTage,  document.getElementById('helfer-body'), false);

  } catch(e) {
    einsaetzeBody.innerHTML = `<div style="color:var(--text-muted);font-size:13px">Fehler beim Laden: ${e.message}</div>`;
    console.error(e);
  }
}

loadNews();
loadUserData();

window.refreshAll = async function() {
  const btn = document.getElementById('refresh-btn');
  if (btn) btn.classList.add('spinning');
  try {
    await Promise.all([loadNews(), loadUserData(), loadTeamleiter(), loadOrga()]);
  } finally {
    if (btn) btn.classList.remove('spinning');
  }
};
</script>
</body>
</html>
