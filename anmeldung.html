<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="color-scheme" content="light">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmeldung – Gemeindehaus Achim</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root { color-scheme: light; }
html, body { background-color: #f4f1e8 !important; color: #1c1b18 !important; }
@media (prefers-color-scheme: dark) {
  html, body { background-color: #f4f1e8 !important; color: #1c1b18 !important; }
  * { color-scheme: light !important; }
  input, select, textarea, button { background-color: white !important; color: #1c1b18 !important; }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ink: #1c1b18; --paper: #f4f1e8; --cream: #ece8dc;
  --accent: #b85c2a; --accent-light: #f0d9cc;
  --muted: #79776e; --border: #d6d0c4; --success: #3a7a52; --radius: 5px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); min-height: 100vh; font-size: 14px; line-height: 1.6; }
.page { max-width: 720px; margin: 0 auto; min-height: 100vh; }
.form-side { padding: 40px 40px 64px; display: flex; flex-direction: column; }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 40px; }
.logo-mark { width: 28px; height: 28px; background: var(--accent); border-radius: 5px; display: flex; align-items: center; justify-content: center; }
.logo-mark svg { width: 14px; height: 14px; fill: white; }
.logo-text { font-size: 13px; font-weight: 500; }
.logo-sub { font-size: 11px; color: var(--muted); font-weight: 300; margin-top: 1px; }
.form-header { margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
.form-header h1 { font-family: 'DM Serif Display', serif; font-size: 32px; font-weight: 400; line-height: 1.2; margin-bottom: 10px; }
.form-header h1 span { font-style: italic; color: var(--accent); }
.form-header p { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.7; }

/* TABS */
.tabs { display: grid; grid-template-columns: repeat(2, 1fr); margin-bottom: 28px; border-bottom: 1px solid var(--border); }
.tab { padding: 10px 4px; font-size: 11px; font-weight: 400; color: var(--muted); cursor: pointer; border: none; background: transparent; font-family: 'DM Sans', sans-serif; transition: color 0.15s; border-bottom: 3px solid transparent; margin-bottom: -1px; -webkit-tap-highlight-color: transparent; touch-action: manipulation; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tab.active { color: var(--accent) !important; border-bottom: 3px solid var(--accent) !important; font-weight: 500 !important; background: transparent !important; }
.tab-panel { display: none; flex-direction: column; gap: 18px; }
.tab-panel.active { display: flex; }

/* FIELDS */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.field input, .field select, .field textarea { font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300; background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 13px; color: var(--ink); outline: none; width: 100%; transition: border-color 0.15s; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field input.error { border-color: #e07060; background: #fff5f4; }
.field input.error:focus { border-color: #e07060; }
.field textarea { resize: vertical; min-height: 70px; }
.field select { cursor: pointer; appearance: none; background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%2379776e' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"); background-repeat: no-repeat; background-position: right 13px center; padding-right: 34px; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.section-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.divider { height: 1px; background: var(--border); }
.notice { font-size: 12px; color: var(--muted); font-weight: 300; line-height: 1.55; margin-top: 2px; }

/* CHECKBOXES */
.checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.checkbox-item { display: flex; align-items: center; gap: 9px; padding: 9px 12px; background: white; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.checkbox-item:hover { border-color: var(--accent); }
.checkbox-item input[type="checkbox"] { display: none; }
.check-box { width: 15px; height: 15px; border: 1.5px solid var(--border); border-radius: 2px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.checkbox-item input:checked ~ .check-box { background: var(--accent); border-color: var(--accent); }
.checkbox-item input:checked ~ .check-box::after { content: ''; display: block; width: 7px; height: 4px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); }
.check-label { font-size: 13px; font-weight: 300; }

/* Schichtarbeit toggle */
.schichtarbeit-toggle { display: flex; align-items: flex-start; gap: 12px; padding: 14px 16px; background: white; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; transition: border-color 0.15s; user-select: none; -webkit-tap-highlight-color: transparent; }
.schichtarbeit-toggle:hover { border-color: var(--accent); }
.schichtarbeit-toggle input[type="checkbox"] { display: none; }
.schichtarbeit-toggle .check-box { margin-top: 2px; width: 17px; height: 17px; border: 1.5px solid var(--border); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.schichtarbeit-toggle input:checked ~ .check-box { background: var(--accent); border-color: var(--accent); }
.schichtarbeit-toggle input:checked ~ .check-box::after { content: ''; display: block; width: 8px; height: 4.5px; border-left: 1.5px solid white; border-bottom: 1.5px solid white; transform: rotate(-45deg) translateY(-1px); }
.schichtarbeit-toggle .toggle-text strong { font-size: 13px; font-weight: 500; display: block; margin-bottom: 2px; }
.schichtarbeit-toggle .toggle-text span { font-size: 12px; font-weight: 300; color: var(--muted); line-height: 1.5; }

/* GEWERK */
.gewerk-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.gewerk-group-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); padding: 8px 0 2px; grid-column: 1 / -1; }
.gewerk-item { display: flex; align-items: center; gap: 8px; padding: 8px 11px; background: white; border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer; user-select: none; transition: border-color 0.15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.gewerk-item:hover { border-color: var(--accent); }
.gewerk-item input[type="checkbox"] { display: none; }
.gewerk-level { display: none; grid-column: 1 / -1; background: var(--accent-light); border: 1px solid #ddb99a; border-radius: var(--radius); padding: 10px 14px; align-items: center; gap: 10px; flex-wrap: wrap; }
.gewerk-level.visible { display: flex; }
.gewerk-level-name { font-size: 11px; font-weight: 500; color: var(--accent); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
.level-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.level-pill { padding: 4px 12px; border: 1px solid #ddb99a; border-radius: 20px; font-size: 12px; cursor: pointer; background: white; color: var(--ink); transition: all 0.12s; user-select: none; font-family: 'DM Sans', sans-serif; font-weight: 300; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.level-pill:hover { border-color: var(--accent); color: var(--accent); }
.level-pill.selected { background: var(--accent); border-color: var(--accent); color: white; }
.gewerk-loading { grid-column: 1/-1; padding: 24px; text-align: center; color: var(--muted); font-size: 13px; font-weight: 300; }
.gewerk-error { grid-column: 1/-1; padding: 14px; background: #fdf5ee; border: 1px solid var(--accent-light); border-radius: var(--radius); color: #7a3a12; font-size: 13px; }

/* BUTTONS */
.submit-btn { padding: 13px 24px; background: var(--ink); color: white; border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.submit-btn:hover { background: #2e2d28; }
.btn-back { padding: 13px 24px; background: white; color: var(--ink); border: 1px solid var(--border); border-radius: var(--radius); font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; transition: border-color 0.15s; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.btn-back:hover { border-color: var(--ink); }
.btn-row { display: flex; gap: 10px; justify-content: space-between; margin-top: 8px; align-items: center; }

/* SUCCESS TOAST */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1c1b18; color: white; border-radius: 8px; padding: 12px 20px; font-size: 13px; font-weight: 400; z-index: 9999; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 24px rgba(0,0,0,0.18); transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.35s; opacity: 0; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
.toast.success { background: #2d6a47; }
.toast.error { background: #b83a2a; }
.toast-icon { font-size: 15px; }

/* ── INFOS TAB ── */
.info-block { background: white; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.info-block-header { padding: 10px 16px; background: var(--cream); border-bottom: 1px solid var(--border); font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.info-block-body { padding: 18px 16px; }
.info-placeholder-img { background: linear-gradient(135deg, var(--cream) 0%, #e0dbcc 100%); border: 2px dashed var(--border); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 36px 20px; color: var(--muted); font-size: 13px; font-weight: 300; text-align: center; }
.info-placeholder-img svg { width: 32px; height: 32px; opacity: 0.4; }
.info-placeholder-img .img-label { font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; opacity: 0.6; }
.info-text { font-size: 13px; font-weight: 300; line-height: 1.75; color: var(--ink); }
.info-text h3 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; margin-bottom: 8px; }
.info-text p + p { margin-top: 10px; }
.info-text ul { padding-left: 18px; margin-top: 6px; }
.info-text ul li { margin-bottom: 4px; }
.info-loading { padding: 32px; text-align: center; color: var(--muted); font-size: 13px; }
.info-img-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.info-img-real { width: 100%; border-radius: var(--radius); display: block; object-fit: cover; aspect-ratio: 4/3; }
.info-tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.05em; background: var(--accent-light); color: var(--accent); border: 1px solid #ddb99a; margin-right: 5px; margin-bottom: 4px; }
.info-meta { font-size: 12px; color: var(--muted); font-weight: 300; }

@media (max-width: 600px) {
  .form-side { padding: 24px 16px 48px; }
  .row { grid-template-columns: 1fr; }
  .checkbox-grid { grid-template-columns: 1fr; }
  .gewerk-grid { grid-template-columns: 1fr; }
  .info-img-grid { grid-template-columns: 1fr; }
  .tabs { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span class="toast-icon">✓</span>
  <span id="toast-msg">Gespeichert</span>
</div>

<div class="page">
  <img src="Anmeldung-Banner.png" alt="Gemeindehaus Achim" style="width:100%;display:block;object-fit:cover;">
  <div class="form-side">

    <div class="tabs">
      <button class="tab active" onclick="switchTab('person',0)">1 · Profil</button>
      <button class="tab" onclick="switchTab('gewerk',1)">2 · Gewerke</button>
    </div>

    <form id="anmeldeform" onsubmit="handleSubmit(event)" novalidate>

      <!-- TAB 1 – Profil -->
      <div class="tab-panel active" id="tab-person">
        <div class="section-title">Persönliche Daten</div>
        <div class="row">
          <div class="field"><label>Vorname</label><input type="text" name="vorname" id="f-vorname" required placeholder="Max"></div>
          <div class="field"><label>Nachname</label><input type="text" name="nachname" id="f-nachname" required placeholder="Mustermann"></div>
        </div>
        <div class="row">
          <div class="field"><label>Telefon</label><input type="tel" name="telefon" id="f-telefon" required placeholder="+49 170 ..."></div>
        </div>
        <div class="divider"></div>
        <div class="section-title">Arbeitssituation</div>
        <label class="schichtarbeit-toggle">
          <input type="checkbox" name="schichtarbeit" id="cb-schichtarbeit">
          <span class="check-box"></span>
          <span class="toggle-text">
            <strong>Ich arbeite im Schichtbetrieb</strong>
            <span>Da unter der Woche auch vormittags gearbeitet wird, ist diese Information in der Organisation hilfreich.</span>
          </span>
        </label>
        <div class="btn-row">
          <span></span>
          <button type="button" class="submit-btn" style="background:var(--accent)" onclick="saveTabAndGo('person','gewerk',1)">Weiter →</button>
        </div>
      </div>

      <!-- TAB 2 – Gewerke -->
      <div class="tab-panel" id="tab-gewerk">
        <p class="notice" style="font-size:13px;color:var(--ink)">Du kannst mehrere Gewerke auswählen. Bei jedem Gewerk bitte die Erfahrung angeben.</p>
        <div class="field">
          <div class="gewerk-grid" id="bauhelfer-grid"></div>
        </div>
        <div class="field">
          <label>Gewerk(e)</label>
          <div class="gewerk-grid" id="gewerk-grid">
            <div class="gewerk-loading">Gewerke werden geladen …</div>
          </div>
        </div>
        <div class="field">
          <label>Sonstige Qualifikationen, Ergänzungen zu Gewerken & Erfahrung (Optional)</label>
          <input type="text" name="qualifikationen" id="f-qualifikationen" placeholder="z.B. zu Elektrotechnik: Erfahrung mit Beleuchtung, Staplerschein, ...">
        </div>
        <div class="field">
          <label>Teamwunsch (optional)</label>
          <textarea name="teamwunsch" id="f-teamwunsch" rows="3" placeholder="z.B. wegen Fahrgemeinschaft bitte in dieselbe Gruppe wie Hans Meier ..."></textarea>
        </div>
        <div class="btn-row">
          <button type="button" class="btn-back" onclick="switchTab('person',0)">← Zurück</button>
          <button type="submit" class="submit-btn">Jetzt anmelden →</button>
        </div>
      </div>


    </form>
  </div>
</div>

<!-- Hidden draft ID -->
<input type="hidden" id="draft-id" value="">

<script>
// ─────────────────────────────────────────────
// TABS
// ─────────────────────────────────────────────
function switchTab(id, idx) {
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.tab')[idx].classList.add('active');
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
var toastTimer;
function showToast(msg, type) {
  clearTimeout(toastTimer);
  var el = document.getElementById('toast');
  var msgEl = document.getElementById('toast-msg');
  el.className = 'toast ' + (type || '');
  el.querySelector('.toast-icon').textContent = type === 'error' ? '✕' : '✓';
  msgEl.textContent = msg;
  el.classList.add('show');
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3500);
}

// ─────────────────────────────────────────────
// COLLECT FORM DATA
// ─────────────────────────────────────────────
var loadedGewerke = [];

function collectPayload() {
  var gewerke = [];
  document.querySelectorAll('input[name="gewerk"]:checked').forEach(function(cb) { gewerke.push(cb.value); });
  var erfahrung = {};
  gewerke.forEach(function(g) {
    var el = document.getElementById('level-val-' + g);
    erfahrung[g] = el ? (el.value || '') : '';
  });
  return {
    vorname: document.getElementById('f-vorname').value || '',
    nachname: document.getElementById('f-nachname').value || '',
    telefon: document.getElementById('f-telefon').value || '',
    schichtarbeit: document.getElementById('cb-schichtarbeit').checked,
    gewerke: gewerke,
    erfahrung: erfahrung,
    qualifikationen: document.getElementById('f-qualifikationen').value || '',
    teamwunsch: document.getElementById('f-teamwunsch').value || '',
    status: 'angemeldet',
    updatedAt: new Date().toISOString()
  };
}

// ─────────────────────────────────────────────
// SAVE (Firestore) – called on tab switch
// ─────────────────────────────────────────────
async function saveDraft() {
  if (!window._saveAnmeldung) return;
  try {
    var payload = collectPayload();
    var result = await window._saveAnmeldung(payload);
    if (result && result.id) {
      document.getElementById('draft-id').value = result.id;
    }
  } catch(e) {
    console.warn('Autosave fehlgeschlagen', e);
  }
}

async function saveTabAndGo(fromTabId, toTabId, toIdx) {
  await saveDraft();
  switchTab(toTabId, toIdx);
}

// ─────────────────────────────────────────────
// GEWERK STATE
// ─────────────────────────────────────────────
function buildGewerkGrid(gewerke, levels) {
  var grid = document.getElementById('gewerk-grid');
  var bauhelferGrid = document.getElementById('bauhelfer-grid');
  grid.innerHTML = '';
  bauhelferGrid.innerHTML = '';

  // Bauhelfer allgemein in eigenen Container
  var bauhelferItem = buildGewerkItem({ id: 'bauhelfer_allgemein', name: 'Bauhelfer allgemein', levels: [] }, levels);
  bauhelferGrid.appendChild(bauhelferItem.label);
  bauhelferGrid.appendChild(bauhelferItem.levelRow);

  if (!gewerke || gewerke.length === 0) {
    grid.innerHTML = '<div class="gewerk-error">Keine Gewerke verfügbar. Bitte später versuchen.</div>';
    return;
  }
  loadedGewerke = gewerke;

  gewerke.forEach(function(g) {
    var item = buildGewerkItem(g, levels);
    grid.appendChild(item.label);
    grid.appendChild(item.levelRow);
  });
}

function buildGewerkItem(g, levels) {
  var safeId = g.id;
  var label = document.createElement('label');
  label.className = 'gewerk-item checkbox-item';
  label.innerHTML =
    '<input type="checkbox" name="gewerk" value="' + safeId + '" id="cb-' + safeId + '">' +
    '<span class="check-box"></span>' +
    '<span class="check-label">' + g.name + '</span>';
  label.querySelector('input').addEventListener('change', function() { toggleLevel(safeId, this.checked); });

  var levelRow = document.createElement('div');
  levelRow.className = 'gewerk-level';
  levelRow.id = 'level-' + safeId;
  levelRow.style.gridColumn = '1 / -1';

  var gwLevels = (g.levels || [])
    .map(function(lid) { return levels.find(function(l) { return l.id === lid; }); })
    .filter(Boolean);

  if (gwLevels.length > 0) {
    var nameSpan = document.createElement('span');
    nameSpan.className = 'gewerk-level-name';
    nameSpan.textContent = g.name.split('/')[0].trim() + ':';
    levelRow.appendChild(nameSpan);

    var pillsWrap = document.createElement('div');
    pillsWrap.className = 'level-pills';
    pillsWrap.id = 'pills-' + safeId;

    gwLevels.forEach(function(lv) {
      var pill = document.createElement('span');
      pill.className = 'level-pill';
      pill.textContent = lv.name;
      pill.addEventListener('click', function(e) {
        e.stopPropagation();
        pillsWrap.querySelectorAll('.level-pill').forEach(function(p) { p.classList.remove('selected'); });
        pill.classList.add('selected');
        document.getElementById('level-val-' + safeId).value = lv.id;
        levelRow.style.borderColor = '';
        levelRow.style.background = '';
      });
      pillsWrap.appendChild(pill);
    });
    levelRow.appendChild(pillsWrap);

    var hiddenInput = document.createElement('input');
    hiddenInput.type = 'hidden';
    hiddenInput.name = 'level_' + safeId;
    hiddenInput.id = 'level-val-' + safeId;
    levelRow.appendChild(hiddenInput);
  } else {
    levelRow.style.cssText = 'display:none;grid-column:1/-1';
  }

  return { label: label, levelRow: levelRow };
}

function toggleLevel(id, checked) {
  var levelRow = document.getElementById('level-' + id);
  if (!levelRow || levelRow.style.display === 'none') return;
  if (checked) { levelRow.classList.add('visible'); }
  else {
    levelRow.classList.remove('visible');
    if (levelRow.querySelector('.level-pills')) {
      levelRow.querySelectorAll('.level-pill').forEach(function(p) { p.classList.remove('selected'); });
    }
    var valInput = document.getElementById('level-val-' + id);
    if (valInput) valInput.value = '';
  }
}

// ─────────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────────
async function handleSubmit(e) {
  e.preventDefault();

  // Validate required fields
  var required = [
    document.getElementById('f-vorname'),
    document.getElementById('f-nachname'),
    document.getElementById('f-telefon')
  ];
  var hasError = false;
  required.forEach(function(el) {
    if (!el.value.trim()) {
      el.classList.add('error');
      el.addEventListener('input', function() { el.classList.remove('error'); }, { once: true });
      hasError = true;
    }
  });
  if (hasError) {
    switchTab('person', 0);
    return;
  }

  // Validate: alle Gewerke mit Levels brauchen eine Auswahl
  var missingLevel = false;
  document.querySelectorAll('input[name="gewerk"]:checked').forEach(function(cb) {
    var valInput = document.getElementById('level-val-' + cb.value);
    if (valInput && !valInput.value) {
      // Level-Row rot markieren
      var levelRow = document.getElementById('level-' + cb.value);
      if (levelRow) {
        levelRow.style.borderColor = '#e07060';
        levelRow.style.background = '#fff5f4';
      }
      missingLevel = true;
    }
  });
  if (missingLevel) {
    switchTab('gewerk', 1);
    showToast('Bitte bei jedem Gewerk die Erfahrung angeben.', 'error');
    return;
  }

  var payload = collectPayload();
  payload.status = 'final';

  if (window._saveAnmeldung) {
    try {
      await window._saveAnmeldung(payload);
      showToast('Anmeldung eingegangen!', 'success');
    } catch(err) {
      showToast('Fehler beim Speichern. Bitte nochmal versuchen.', 'error');
      return;
    }
  } else {
    showToast('Anmeldung eingegangen!', 'success');
  }

  // Reset form
  document.getElementById('anmeldeform').reset();
  loadedGewerke.forEach(function(g) {
    var l = document.getElementById('level-' + g.id);
    if (l) l.classList.remove('visible');
    var pills = document.getElementById('pills-' + g.id);
    if (pills) pills.querySelectorAll('.level-pill').forEach(function(p) { p.classList.remove('selected'); });
    var valInput = document.getElementById('level-val-' + g.id);
    if (valInput) valInput.value = '';
  });
  // Also reset bauhelfer
  var lBh = document.getElementById('level-bauhelfer_allgemein');
  if (lBh) lBh.classList.remove('visible');
}

</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, doc, getDoc, addDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDSZ6yuKgdGFhymzHMLrdl_P3zGMCpj9kM",
  authDomain: "gemeindehaus-achim.firebaseapp.com",
  projectId: "gemeindehaus-achim",
  storageBucket: "gemeindehaus-achim.firebasestorage.app",
  messagingSenderId: "272798328583",
  appId: "1:272798328583:web:388aa8db19886e9be507a2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── Save / upsert Anmeldung ──
window._saveAnmeldung = async function(payload) {
  const draftId = document.getElementById('draft-id').value;
  if (draftId) {
    await updateDoc(doc(db, 'anmeldungen', draftId), { ...payload, updatedAt: serverTimestamp() });
    return { id: draftId };
  } else {
    const ref = await addDoc(collection(db, 'anmeldungen'), { ...payload, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
    document.getElementById('draft-id').value = ref.id;
    return { id: ref.id };
  }
};

// ── Load Gewerke ──
async function loadGewerke() {
  const container = document.getElementById('gewerk-grid');
  container.innerHTML = '<div class="gewerk-loading">Gewerke werden geladen …</div>';
  try {
    const snap = await getDoc(doc(db, 'planung', 'gewerkeKonfig'));
    if (!snap.exists()) { container.innerHTML = '<div class="gewerk-error">Keine Daten gefunden.</div>'; return; }
    const data = snap.data();
    const gewerke = (data.gewerke || []).filter(g => g.active && g.visibleInForm);
    const levels = data.levels || [];
    buildGewerkGrid(gewerke, levels);
  } catch (e) {
    console.error(e);
    container.innerHTML = '<div class="gewerk-error">Fehler beim Laden der Gewerke.</div>';
  }
}

window.addEventListener('DOMContentLoaded', function() {
  loadGewerke();
});
</script>
